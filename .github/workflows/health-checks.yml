name: Smart Daily Health Checks

on:
  schedule:
    - cron: '0 8 * * *'   # 08:00 - Ochtend bloedwaarden
    - cron: '0 10 * * *'  # 10:00 - Medicatie
    - cron: '0 13 * * *'  # 13:00 - Middag bloedwaarden
    - cron: '0 22 * * *'  # 22:00 - Avond bloedwaarden
  workflow_dispatch:

jobs:
  check-and-alert:
    runs-on: ubuntu-latest
    steps:
      - name: Download backup from Google Drive
        env:
          DRIVE_FILE_ID: 1ycJ-3xac6yxBbDEl3rLen8VLrRYHYi4W
        run: |
          curl -L "https://drive.google.com/uc?export=download&id=$DRIVE_FILE_ID" -o backup.json
          echo "✅ Download OK"
          cat backup.json | head -20

      - name: Check and send alerts
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT_ID: 8526489078
        run: |
          #!/bin/bash
          
          # Read backup file
          BACKUP=$(cat backup.json)
          TODAY=$(date +%Y-%m-%d)
          HOUR=$(date +%H)
          
          echo "Checking date: $TODAY, Hour: $HOUR"
          
          # Function to send Telegram
          send_telegram() {
            local MSG="$1"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${CHAT_ID}" \
              -d "text=${MSG}"
            echo "✅ Sent: ${MSG:0:30}..."
          }
          
          # Check based on hour
          case $HOUR in
            08)
              echo "Checking: Ochtend bloedwaarden"
              # Extract ochtend values
              SYS=$(echo "$BACKUP" | grep -o '"ochtend":{[^}]*"sys":[0-9]*' | grep -o '[0-9]*$')
              DIA=$(echo "$BACKUP" | grep -o '"ochtend":{[^}]*"dia":[0-9]*' | grep -o '[0-9]*$')
              HR=$(echo "$BACKUP" | grep -o '"ochtend":{[^}]*"hr":[0-9]*' | grep -o '[0-9]*$')
              
              MISSING=""
              [ -z "$SYS" ] && MISSING="Systolisch, "
              [ -z "$DIA" ] && MISSING="${MISSING}Diastolisch, "
              [ -z "$HR" ] && MISSING="${MISSING}Hartslag"
              MISSING="${MISSING%, }"
              
              if [ ! -z "$MISSING" ]; then
                send_telegram "❌ OCHTEND BLOEDWAARDEN MISSEN!%0AOntbreekt: ${MISSING}"
              else
                echo "✅ Alles OK"
              fi
              ;;
            
            10)
              echo "Checking: Medicatie"
              # Simple check - if both meds logged for today
              BELSAR=$(echo "$BACKUP" | grep -o '"belsar":{[^}]*"'$TODAY'"' | wc -l)
              PANTOMED=$(echo "$BACKUP" | grep -o '"pantomed":{[^}]*"'$TODAY'"' | wc -l)
              
              MISSING=""
              [ "$BELSAR" -eq 0 ] && MISSING="Belsar, "
              [ "$PANTOMED" -eq 0 ] && MISSING="${MISSING}Pantomed"
              MISSING="${MISSING%, }"
              
              if [ ! -z "$MISSING" ]; then
                send_telegram "❌ MEDICATIE NIET INGENOMEN!%0AOntbreekt: ${MISSING}"
              else
                echo "✅ Alles OK"
              fi
              ;;
            
            13)
              echo "Checking: Middag bloedwaarden"
              # Extract middag values
              SYS=$(echo "$BACKUP" | grep -o '"middag":{[^}]*"sys":[0-9]*' | grep -o '[0-9]*$')
              DIA=$(echo "$BACKUP" | grep -o '"middag":{[^}]*"dia":[0-9]*' | grep -o '[0-9]*$')
              HR=$(echo "$BACKUP" | grep -o '"middag":{[^}]*"hr":[0-9]*' | grep -o '[0-9]*$')
              
              MISSING=""
              [ -z "$SYS" ] && MISSING="Systolisch, "
              [ -z "$DIA" ] && MISSING="${MISSING}Diastolisch, "
              [ -z "$HR" ] && MISSING="${MISSING}Hartslag"
              MISSING="${MISSING%, }"
              
              if [ ! -z "$MISSING" ]; then
                send_telegram "❌ MIDDAG BLOEDWAARDEN MISSEN!%0AOntbreekt: ${MISSING}"
              else
                echo "✅ Alles OK"
              fi
              ;;
            
            22)
              echo "Checking: Avond bloedwaarden"
              # Extract avond values
              SYS=$(echo "$BACKUP" | grep -o '"avond":{[^}]*"sys":[0-9]*' | grep -o '[0-9]*$')
              DIA=$(echo "$BACKUP" | grep -o '"avond":{[^}]*"dia":[0-9]*' | grep -o '[0-9]*$')
              HR=$(echo "$BACKUP" | grep -o '"avond":{[^}]*"hr":[0-9]*' | grep -o '[0-9]*$')
              
              MISSING=""
              [ -z "$SYS" ] && MISSING="Systolisch, "
              [ -z "$DIA" ] && MISSING="${MISSING}Diastolisch, "
              [ -z "$HR" ] && MISSING="${MISSING}Hartslag"
              MISSING="${MISSING%, }"
              
              if [ ! -z "$MISSING" ]; then
                send_telegram "❌ AVOND BLOEDWAARDEN MISSEN!%0AOntbreekt: ${MISSING}"
              else
                echo "✅ Alles OK"
              fi
              ;;
            
            *)
              echo "No check scheduled for hour: $HOUR"
              ;;
          esac
