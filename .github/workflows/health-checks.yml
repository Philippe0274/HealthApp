name: Daily Health Checks

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-check:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram test
        env:
          TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          CHAT: ${{ secrets.TELEGRAM_CHATID }}
        run: |
          curl -X POST https://api.telegram.org/bot${TOKEN}/sendMessage \
          --data chat_id=${CHAT} \
          --data text="🧪 TEST - GitHub Actions werkt!"
