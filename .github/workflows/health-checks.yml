name: Daily Health Checks

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-check:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram test
        run: |
          MESSAGE="🧪 TEST - Health Checks draait!"
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=${{ secrets.TELEGRAM_CHATID }}" \
            -d "text=$MESSAGE"
