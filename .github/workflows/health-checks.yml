name: Daily Health Checks

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  send-check:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram test
        run: |
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d "chat_id=8526489078" \
          -d "text=🧪 TEST - GitHub draait!"
