name: Daily Health Checks

on:
  schedule:
    - cron: '0 10 * * *'
    - cron: '0 13 * * *'
    - cron: '0 19 * * *'
    - cron: '0 21 * * *'
  workflow_dispatch:

jobs:
  send-check:
    runs-on: ubuntu-latest
    steps:
      - name: Send Telegram check
        run: |
          HOUR=$(date -u +%H)
          
          if [ "$HOUR" = "10" ]; then
            MESSAGE="💊 MEDICATIE CHECK - 10:00%0AHeb je je medicatie al ingenomen?"
          elif [ "$HOUR" = "13" ]; then
            MESSAGE="🌤️ MIDDAG BLOEDWAARDEN - 13:00%0AHeb je je metingen gedaan?"
          elif [ "$HOUR" = "19" ]; then
            MESSAGE="🌙 AVOND BLOEDWAARDEN - 19:00%0AHeb je je metingen gedaan?"
          elif [ "$HOUR" = "21" ]; then
            MESSAGE="📊 DAGELIJKS RAPPORT%0AWachting op app data..."
          fi
          
          curl -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d "chat_id=8526489078" \
            -d "text=$MESSAGE"
