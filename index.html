        const DOCTOR_DATA = {name:'Dr. Verbesselt Koen',address:'Wolvertemsesteenweg 115 - 1850 Grimbergen',phone:'02 269 12 54',hours:{ma_do:'07:00-19:30',vr:'07:00-18:30'}};

        // ══════════════════════════════════════════════════════════
        // GOOGLE DRIVE - GLOBALE VARIABLES & FUNCTIES
        // ══════════════════════════════════════════════════════════
        const GDRIVE_CLIENT_ID = '333079195698-gt6gm0ra37e53ujd782424nea5e9iiqq.apps.googleusercontent.com';
        const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.profile'; // Full drive access!
        const GDRIVE_FOLDER_ID = '1flE6MFq5be0xCPpPJbyozIVTIZOhzu0X'; // SyncHealthapp folder
        const GDRIVE_FILE_NAME = 'healthapp-backup.json';

        let gTokenClient = null;
        let gAccessToken = null; // ALTIJD null bij start - localStorage negeren!
        let gTokenExpiry = 0;
        let gFileId = null;
        let gUserName = null;
        let gSyncing = false;
        let gLastSync = 0;

        function isGTokenValid() {
          if (!gAccessToken || gAccessToken === 'null' || gAccessToken === '') return false;
          if (!gTokenExpiry || gTokenExpiry <= 0) return false;
          return Date.now() < gTokenExpiry - 60000;
        }

        function initGoogleDrive() {
          // Clean invalid tokens at startup
          if (!gAccessToken || gAccessToken === 'null' || gAccessToken === '') {
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expiry');
            localStorage.removeItem('gdrive_user_name');
            gAccessToken = null;
            gTokenExpiry = 0;
            gUserName = null;
          }
          
          if (typeof google === 'undefined' || !google.accounts) {
            setTimeout(initGoogleDrive, 1000);
            return;
          }
          gTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GDRIVE_CLIENT_ID,
            scope: GDRIVE_SCOPE,
            callback: async (resp) => {
              if (resp.error) {
                alert('❌ Google login: ' + resp.error);
                return;
              }
              gAccessToken = resp.access_token;
              gTokenExpiry = Date.now() + (resp.expires_in * 1000);
              localStorage.setItem('gdrive_token', gAccessToken);
              localStorage.setItem('gdrive_token_expiry', String(gTokenExpiry));
              await fetchGUserInfo();
              app.sendTg('✅ Google Drive verbonden!');
              alert('✅ Google Drive verbonden!');
              app.show();
            }
          });
          if (isGTokenValid()) {
            app.show();
          }
        }

        async function fetchGUserInfo() {
          try {
            const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const d = await r.json();
            gUserName = d.name || d.email || 'Google';
            localStorage.setItem('gdrive_user_name', gUserName);
          } catch(e) { console.warn('userinfo:', e); }
        }

        function handleSyncAction() {
          if (isGTokenValid()) {
            gAccessToken = null;
            gTokenExpiry = 0;
            gUserName = null;
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expiry');
            localStorage.removeItem('gdrive_user_name');
            alert('✅ Google Drive ontkoppeld');
            app.show();
          } else {
            if (!gTokenClient) { alert('Google laden...'); return; }
            gTokenClient.requestAccessToken({ prompt: gUserName ? '' : 'consent' });
          }
        }

        async function driveSync() {
          if (!isGTokenValid()) { alert('Niet verbonden met Google Drive'); return; }
          if (gSyncing) return;
          gSyncing = true;
          try {
            const backup = {
              meds: app.data.meds,
              intakes: app.data.intakes,
              measures: app.data.measures,
              rapportages: app.data.rapportages || {},
              settings: app.settings,
              timestamp: new Date().toISOString()
            };
            const json = JSON.stringify(backup, null, 2);
            let fileId = localStorage.getItem('gdrive_file_id');
            
            if (fileId) {
              // UPDATE: DELETE old, CREATE new
              try {
                await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
                  method: 'DELETE',
                  headers: { Authorization: `Bearer ${gAccessToken}` }
                });
              } catch(e) { console.warn('Delete failed:', e); }
              fileId = null;
            }
            
            // CREATE new file
            const meta = { name: GDRIVE_FILE_NAME, parents: [GDRIVE_FOLDER_ID] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
            form.append('file', new Blob([json], {type:'application/json'}));
            
            const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
              method: 'POST',
              headers: { Authorization: `Bearer ${gAccessToken}` },
              body: form
            });
            
            if (!r.ok) throw new Error('Upload failed: ' + r.status);
            const created = await r.json();
            fileId = created.id;
            localStorage.setItem('gdrive_file_id', fileId);
            gFileId = fileId;
            gLastSync = Date.now();
            localStorage.setItem('gdrive_last_sync', String(gLastSync));
            
            app.sendTg('☁️ Backup gestuurd!');
            alert('✅ Backup gestuurd!');
          } catch(e) {
            console.error('Sync error:', e);
            alert('❌ Error: ' + e.message);
          } finally {
            gSyncing = false;
          }
        }

        async function driveRestore() {
          if (!isGTokenValid()) { alert('Niet verbonden met Google Drive'); return; }
          if (gSyncing) return;
          gSyncing = true;
          try {
            // Search for backup file in folder
            const q = `name='${GDRIVE_FILE_NAME}' and '${GDRIVE_FOLDER_ID}' in parents and trashed=false`;
            const searchUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&spaces=drive&fields=files(id,name)`;
            const searchRes = await fetch(searchUrl, {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const searchData = await searchRes.json();
            
            if (!searchData.files || searchData.files.length === 0) {
              alert('❌ Backup bestand niet gevonden in Google Drive!');
              gSyncing = false;
              return;
            }
            
            const fileId = searchData.files[0].id;
            
            // Download file
            const downloadUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
            const downloadRes = await fetch(downloadUrl, {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const jsonText = await downloadRes.text();
            const backup = JSON.parse(jsonText);
            
            // Restore data
            app.data.meds = backup.meds || [];
            app.data.intakes = backup.intakes || {};
            app.data.measures = backup.measures || {};
            app.data.rapportages = backup.rapportages || {};
            app.settings = backup.settings || app.settings;
            app.save(); // CORRECT methode!
            
            app.sendTg('☁️ Backup hersteld van Google Drive!');
            alert('✅ Backup hersteld van Google Drive!');
            
            // Open folder in new window
            setTimeout(() => {
              window.open('https://drive.google.com/drive/folders/1flE6MFq5be0xCPpPJbyozIVTIZOhzu0X', '_blank');
            }, 500);
            
            app.show();
          } catch(e) {
            console.error('Drive restore error:', e);
            alert('❌ Restore error: ' + e.message);
          } finally {
            gSyncing = false;
          }
        }

            saveValuesOnly(moment) {
                const sys = document.getElementById('sys-' + moment)?.value || '';
                const dia = document.getElementById('dia-' + moment)?.value || '';
                const hr = document.getElementById('hr-' + moment)?.value || '';
                
                if (!sys || !dia || !hr) { alert('Vul Sys/Dia/HR in!'); return; }
                
                if (!this.data.measures[this.date]) this.data.measures[this.date] = {};

                const sysVal = parseInt(sys), diaVal = parseInt(dia), hrVal = parseInt(hr);
                const timeVal = document.getElementById('time-' + moment)?.value || '';
                
                this.data.measures[this.date][moment] = { sys: sysVal, dia: diaVal, hr: hrVal, time: timeVal };
                
                const icon = moment === 'ochtend' ? '🌅' : moment === 'middag' ? '☀️' : '🌙';
                const timeDisplay = timeVal || (moment === 'ochtend' ? '08:00' : moment === 'middag' ? '13:00' : '20:00');
                
                if (old && old.sys) {

            sendReport() {
                const rapport = this.generateReport();
                if (!rapport) return;
                
                const msg = '📊 DAGELIJKS RAPPORT - ' + rapport.date + '\n\n🌅 Ochtend: ' + rapport.measurements.ochtend + '\n🌤️ Middag: ' + rapport.measurements.middag + '\n🌙 Avond: ' + rapport.measurements.avond + '\n\nGemiddelden: ' + rapport.averages.sys + '/' + rapport.averages.dia + ' (HR:' + rapport.averages.hr + ')\n\n' + rapport.status.esc + '\n' + rapport.status.thuis + '\n\n' + rapport.message;
                this.sendTg(msg);

            generateReport() {
                const today = new Date().toISOString().split('T')[0];
                const measures = this.data.measures[today] || {};
                
                if (!measures.ochtend && !measures.middag && !measures.avond) return null;
                
                const o = measures.ochtend;
                const m = measures.middag;
                const a = measures.avond;
                
                let sL = [];
                let dL = [];
                let hL = [];
                if (o) { sL.push(o.sys); dL.push(o.dia); hL.push(o.hr); }
                if (m) { sL.push(m.sys); dL.push(m.dia); hL.push(m.hr); }
                if (a) { sL.push(a.sys); dL.push(a.dia); hL.push(a.hr); }
                
                const avgS = Math.round(sL.reduce((x,y) => x+y, 0) / sL.length);
                const avgD = Math.round(dL.reduce((x,y) => x+y, 0) / dL.length);
                const avgH = Math.round(hL.reduce((x,y) => x+y, 0) / hL.length);
                
                let esc, thuis, msg;
                if (avgS < 120 && avgD < 80) { esc = '✅ NORMAAL'; thuis = '🟢 GOED'; msg = 'Fantastisch!'; }
                else if (avgS < 135 && avgD < 85) { esc = '🟡 VERHOOGD'; thuis = '🟡 ATTENTIE'; msg = 'Prima!'; }
                else if (avgS < 140 && avgD < 90) { esc = '🟠 HYPERTENSIE 1'; thuis = '🟠 ALERT'; msg = 'Let op!'; }
                else { esc = '🔴 HYPERTENSIE 2'; thuis = '🔴 KRITISCH'; msg = 'Neem contact arts!'; }
                
                const r = {
                    date: today,
                    measurements: { ochtend: o ? o.sys + '/' + o.dia + ' (HR:' + o.hr + ') @ ' + o.time : 'Niet ingegeven', middag: m ? m.sys + '/' + m.dia + ' (HR:' + m.hr + ') @ ' + m.time : 'Niet ingegeven', avond: a ? a.sys + '/' + a.dia + ' (HR:' + a.hr + ') @ ' + a.time : 'Niet ingegeven' },
                    averages: { sys: avgS, dia: avgD, hr: avgH },
                    status: { esc: esc, thuis: thuis },
                    message: msg
                };
                
                this.data.rapportages = this.data.rapportages || {};
                this.data.rapportages[today] = r;
                localStorage.setItem('data', JSON.stringify(this.data));
                return r;
            }

            uploadBackup() {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.json';
                input.onchange = (e) => {

            generateReportStats() {
                let totalSys = 0, totalDia = 0, totalHr = 0, count = 0;
                let measurementsHtml = '';
                let dailyData = {};
                
                // Collect all measurements and organize by day
                for (let date in this.data.measures) {
                    const day = this.data.measures[date];
                    let daySys = [], dayDia = [], dayHr = [];
                    ['ochtend', 'middag', 'avond'].forEach(moment => {
                        if (day[moment] && day[moment].sys) {
                            daySys.push(day[moment].sys);
                            dayDia.push(day[moment].dia);
                            dayHr.push(day[moment].hr);
                            totalSys += day[moment].sys;
                            totalDia += day[moment].dia;
                            totalHr += day[moment].hr;
                            count++;
                            const [y, m, d] = date.split('-');
                            const momentLabels = {ochtend: '🌅 Ochtend', middag: '☀️ Middag', avond: '🌙 Avond'};
                            measurementsHtml += `<tr><td>${d}/${m}</td><td>${momentLabels[moment]}</td><td>${day[moment].sys}/${day[moment].dia}</td><td>${day[moment].hr}</td></tr>`;
                        }
                    });
                    if (daySys.length > 0) {
                        dailyData[date] = {
                            sys: Math.round(daySys.reduce((a,b)=>a+b)/daySys.length),
                            dia: Math.round(dayDia.reduce((a,b)=>a+b)/dayDia.length),
                            hr: Math.round(dayHr.reduce((a,b)=>a+b)/dayHr.length)
                        };
                    }
                }

                // Calculate trends
                const sortedDates = Object.keys(dailyData).sort();
                let trendSysHtml = '';
                let trendDiaHtml = '';
                let sysTrend = [], diaTrend = [], sysValues = [], diaValues = [];
                
                sortedDates.forEach((date, idx) => {
                    const data = dailyData[date];
                    const [y, m, d] = date.split('-');
                    sysValues.push(data.sys);
                    diaValues.push(data.dia);
                    
                    if (idx === 0) {
                        trendSysHtml += `<div style="padding:6px;border-bottom:1px solid #fecaca;">├─ ${d}/${m}: ${data.sys} mmHg</div>`;
                        sysTrend.push({date, val: data.sys, change: 0});
                    } else {
                        const change = data.sys - dailyData[sortedDates[idx-1]].sys;
                        const arrow = change > 0 ? '📈' : change < 0 ? '📉' : '➡️';
                        trendSysHtml += `<div style="padding:6px;border-bottom:1px solid #fecaca;">├─ ${d}/${m}: ${data.sys} mmHg  → ${arrow} ${change > 0 ? '+' : ''}${change}</div>`;
                        sysTrend.push({date, val: data.sys, change});
                        trendDiaHtml += `<div style="padding:6px;border-bottom:1px solid #fecaca;">├─ ${d}/${m}: ${data.dia} mmHg  → ${arrow} ${change > 0 ? '+' : ''}${(data.dia - dailyData[sortedDates[idx-1]].dia)}</div>`;
                        diaTrend.push({date, val: data.dia, change: data.dia - dailyData[sortedDates[idx-1]].dia});
                    }
                });

                const avgSys = count > 0 ? Math.round(totalSys / count) : 0;
                const avgDia = count > 0 ? Math.round(totalDia / count) : 0;
                const minSys = Math.min(...sysValues);
                const maxSys = Math.max(...sysValues);
                const minDia = Math.min(...diaValues);
                const maxDia = Math.max(...diaValues);
                const varSys = maxSys - minSys;
                const varDia = maxDia - minDia;
                
                const trendStatusSys = varSys > 15 ? '🔴 INSTABIEL' : varSys > 8 ? '🟡 MATIG' : '🟢 STABIEL';
                const trendStatusDia = varDia > 10 ? '🔴 INSTABIEL' : varDia > 5 ? '🟡 MATIG' : '🟢 STABIEL';

                let medicationsHtml = '';
                this.data.meds.forEach(med => {
                    const pills = this.getPills(med.id);
                    const taken = med.pills - pills;
                    const rate = med.pills > 0 ? Math.round((taken / med.pills) * 100) : 0;
                    medicationsHtml += `<div class="med-item">${med.icon} <b>${med.name}</b> (${med.dosage}) - ${rate}% • ${pills} pillen over</div>`;
                });

                return {
                    avgSys: avgSys,
                    avgDia: avgDia,
                    avgHr: count > 0 ? Math.round(totalHr / count) : 0,
                    totalMeasures: count,
                    measurementsHtml: measurementsHtml || '<tr><td colspan="4" style="text-align:center;color:#6b7280;">Geen metingen</td></tr>',
                    medicationsHtml: medicationsHtml || 'Geen medicaties',
                    trendSysHtml: trendSysHtml,
                    trendDiaHtml: trendDiaHtml,
                    trendStatusSys: trendStatusSys,
                    trendStatusDia: trendStatusDia,
                    minSys, maxSys, varSys,
                    minDia, maxDia, varDia,
                    sortedDates: sortedDates
                };
            }

        function showEmailManager() {
            let msg = 'EMAIL ALERTS:\n\n';
            let emails = JSON.parse(localStorage.getItem('alertEmails') || '["philippe.demeersman1970@gmail.com","jflores2000@gmail.com"]');
            
            msg += 'Huidige emails:\n';
            emails.forEach((e, i) => { msg += (i+1) + '. ' + e + '\n'; });
            
            msg += '\n--- OPTIES ---\n';
            msg += '[+] Toevoegen - typ email\n';
            msg += '[#] Verwijderen - typ nummer\n';
            msg += '[X] Annuleren\n';
            
            let action = prompt(msg, '');
            if (!action) return;
            
            if (action.startsWith('+')) {
                let newEmail = prompt('Nieuw email adres:', '');
                if (newEmail && newEmail.includes('@')) {
                    emails.push(newEmail);
                    localStorage.setItem('alertEmails', JSON.stringify(emails));
                    alert('✅ Email toegevoegd!');
                    showEmailManager();
                }
            } else if (!isNaN(action)) {
                let idx = parseInt(action) - 1;
                if (idx >= 0 && idx < emails.length) {
                    emails.splice(idx, 1);
                    localStorage.setItem('alertEmails', JSON.stringify(emails));
                    alert('✅ Email verwijderd!');
                    showEmailManager();
                }
            }
        }

                html += '</div>';
            });
            
            html += '<button onclick="app.addEmailPrompt()" style="background:#10b981;border:none;color:white;width:100%;padding:12px;border-radius:8px;font-weight:500;cursor:pointer;font-size:14px;margin-top:12px;display:flex;align-items:center;justify-content:center;gap:8px;"><span style="font-size:18px;">+</span> Email toevoegen</button>';
            html += '</div></div>';
            return html;
        }
        
        function showPatientForm() {
            document.body.insertAdjacentHTML('beforeend', drawPatientForm());
            setupPatientForm();
        }
        
        function drawPatientForm() {
            return '<div style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.6);display:flex;align-items:center;justify-content:center;z-index:99999;padding:12px;" id="patient-modal" onclick="if(event.target.id===\'patient-modal\') this.remove();"><div style="background:white;border-radius:12px;padding:24px;width:100%;max-width:320px;"><h2 style="margin:0 0 20px 0;font-size:18px;color:#1f2937;font-weight:600;">👤 Patient Toevoegen</h2><form id="patient-form"><div style="margin-bottom:16px;"><label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:6px;">Voornaam *</label><input type="text" id="patient-first" placeholder="Philippe" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;font-size:14px;" required></div><div style="margin-bottom:16px;"><label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:6px;">Achternaam *</label><input type="text" id="patient-last" placeholder="De Meersman" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;font-size:14px;" required></div><div style="margin-bottom:16px;"><label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:6px;">Geboortedatum *</label><input type="date" id="patient-birth" value="1970-05-27" style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;font-size:14px;" required></div><div style="margin-bottom:16px;"><label style="font-size:12px;color:#6b7280;font-weight:600;display:block;margin-bottom:8px;">📷 Foto (optioneel)</label><div id="upload-area" style="border:2px dashed #d1d5db;border-radius:8px;padding:20px;text-align:center;cursor:pointer;background:#f9fafb;"><div style="font-size:32px;margin-bottom:8px;">📸</div><p style="font-size:13px;color:#6b7280;margin:0;">Klik om foto te uploaden</p></div><input type="file" id="patient-photo" accept="image/*" style="display:none;"><div id="preview-container" style="display:none;text-align:center;margin-top:8px;"><img id="photo-preview" style="width:100%;height:120px;object-fit:cover;border-radius:6px;margin-bottom:8px;"><button type="button" id="remove-photo" style="background:#ef4444;color:white;border:none;padding:6px 12px;border-radius:4px;font-size:11px;cursor:pointer;">Foto verwijderen</button></div></div><div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;"><button type="button" style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;padding:11px 16px;border-radius:6px;font-weight:500;cursor:pointer;font-size:14px;" onclick="document.getElementById(\'patient-modal\').remove();">Annuleren</button><button type="button" style="background:#3b82f6;color:white;border:none;padding:11px 16px;border-radius:6px;font-weight:500;cursor:pointer;font-size:14px;" onclick="document.getElementById('patient-first').value && document.getElementById('patient-last').value && document.getElementById('patient-birth').value ? (app.savePatient(document.getElementById('patient-first').value, document.getElementById('patient-last').value, document.getElementById('patient-birth').value, document.getElementById('photo-preview').src || null), document.getElementById('patient-modal').remove()) : alert('Vul voornaam, achternaam en geboortedatum in');">Opslaan</button></div></form></div></div>';
        }
        
        function setupPatientForm() {
            const uploadArea = document.getElementById('upload-area');
            const fileInput = document.getElementById('patient-photo');
            const previewContainer = document.getElementById('preview-container');
            const photoPreview = document.getElementById('photo-preview');
            const removePhotoBtn = document.getElementById('remove-photo');
            const form = document.getElementById('patient-form');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        photoPreview.src = event.target.result;
                        previewContainer.style.display = 'block';
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
            
            removePhotoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.value = '';
                previewContainer.style.display = 'none';
            });
            
            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const firstName = document.getElementById('patient-first').value;
                const lastName = document.getElementById('patient-last').value;
                const birthDate = document.getElementById('patient-birth').value;
                const photoBase64 = photoPreview.src || null;
                
                app.savePatient(firstName, lastName, birthDate, photoBase64);
                document.getElementById('patient-modal').remove();
            });
        }
        
        const app = new App();
        app.show();
        
        // Initialize Google Drive
        (async () => {
          try {
            setTimeout(initGoogleDrive, 1500);
          } catch(err) {
            console.error('Google init error:', err);
          }
        })();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/HealthApp/sw.js').catch(() => {});
            
            // Listen for periodic sync messages from Service Worker
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data.type === 'PERFORM_SYNC') {
                console.log('Auto-sync triggered:', event.data.tag);
                if (isGTokenValid() && typeof driveSync === 'function') {
                  driveSync();
                }
              }
            });
            
            // Register Periodic Background Sync
            if ('serviceWorker' in navigator && 'BackgroundSyncManager' in window) {
              navigator.serviceWorker.ready.then(registration => {
                // Register sync tags for specific times
                const syncTags = ['sync-07', 'sync-09', 'sync-12', 'sync-21'];
                syncTags.forEach(tag => {
                  registration.periodicSync.register(tag, {
                    minInterval: 24 * 60 * 60 * 1000 // Once per day
                  }).catch(() => {});
                });
              });
            }
        }
    </script>
</body>
</html>
