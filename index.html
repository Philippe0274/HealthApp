<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Health Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-user-select: none; }
        input, button { -webkit-user-select: text !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .day-cell { aspect-ratio: 1; border-radius: 8px; padding: 4px; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 48px; background: #fff; border: 2px solid #e5e7eb; font-weight: 600; }
        .day-cell.weekend { background-color: #f9fafb; }
        .day-cell.holiday { background: linear-gradient(135deg, #fef08a 0%, #fde047 100%); }
        .day-cell.today { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #333; }
        .pill-grid { display: grid; gap: 3px; }
        .input-field { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; }
        .med-section { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); border-left: 4px solid; }
        .blood-section { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #8b5cf6; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
        .input-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>
    <script>
        const MED_COLORS = ['#ff0000', '#0066ff', '#00cc00', '#ff6600', '#ff00ff', '#00cccc', '#ffaa00', '#ff0099', '#0099ff', '#ff3333'];
        const MED_ICONS = ['💊', '💉', '🩺', '🏥', '🔬', '⚕️', '🩹', '🧪', '⚕️', '🩊'];

        class HealthTracker {
            constructor() {
                this.data = JSON.parse(localStorage.getItem('healthTrackerData')) || this.initData();
                this.telegram = JSON.parse(localStorage.getItem('telegramSettings')) || { token: '', chatId: '' };
                this.currentMonth = new Date();
                this.selectedDate = null;
                this.view = 'calendar';
                this.showSettings = false;
                this.render();
            }

            initData() {
                return {
                    medications: [{ id: 'med_belsar', name: 'Belsar', dosage: '20mg', totalPills: 49, color: MED_COLORS[0], icon: MED_ICONS[0], resetDate: this.today() }],
                    medicationIntakes: {},
                    measurements: {}
                };
            }

            today() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            save() { localStorage.setItem('healthTrackerData', JSON.stringify(this.data)); }

            async telegram_send(msg) {
                if (!this.telegram.token || !this.telegram.chatId) return;
                try {
                    await fetch(`https://api.telegram.org/bot${this.telegram.token}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: this.telegram.chatId, text: msg, parse_mode: 'HTML' })
                    });
                } catch(e) {}
            }

            openTelegram() {
                const token = prompt('🔑 Bot Token:', this.telegram.token || '');
                if (!token) return;
                const chatId = prompt('💬 Chat ID:', this.telegram.chatId || '');
                if (!chatId) return;
                this.telegram = { token, chatId };
                localStorage.setItem('telegramSettings', JSON.stringify(this.telegram));
                alert('✅ Telegram OK!');
                this.telegram_send('✅ Health Tracker online!');
            }

            getPills(medId) {
                const med = this.data.medications.find(m => m.id === medId);
                const used = Object.values(this.data.medicationIntakes).reduce((s, d) => s + (d[medId] ? 1 : 0), 0);
                return med.totalPills - used;
            }

            addMed() {
                if (this.data.medications.length >= 10) { alert('Max 10!'); return; }
                const name = prompt('Medicatie:');
                if (!name) return;
                const dosage = prompt('Dosage:');
                if (!dosage) return;
                const pills = parseInt(prompt('Pillen (max 70):') || '0');
                if (pills < 1 || pills > 70) { alert('1-70!'); return; }
                
                const med = {
                    id: `med_${Date.now()}`,
                    name, dosage, totalPills: pills,
                    color: MED_COLORS[this.data.medications.length % 10],
                    icon: MED_ICONS[this.data.medications.length % 10],
                    resetDate: this.today()
                };
                this.data.medications.push(med);
                this.save();
                this.telegram_send(`${med.icon} <b>${med.name} TOEGEVOEGD!</b>\n├─ ${med.dosage}\n├─ ${med.totalPills} pillen\n└─ ✅`);
                this.render();
            }

            removeMed(medId) {
                if (this.data.medications.length === 1) { alert('Min 1!'); return; }
                const med = this.data.medications.find(m => m.id === medId);
                if (!confirm(`Verwijderen: ${med.name}?`)) return;
                this.data.medications = this.data.medications.filter(m => m.id !== medId);
                this.data.medicationIntakes = Object.fromEntries(
                    Object.entries(this.data.medicationIntakes).map(([d, m]) => [d, Object.fromEntries(Object.entries(m).filter(([mid]) => mid !== medId))])
                );
                this.save();
                this.telegram_send(`🗑️ <b>${med.icon} ${med.name} VERWIJDERD</b>`);
                this.render();
            }

            resetMed(medId) {
                const med = this.data.medications.find(m => m.id === medId);
                const amt = parseInt(prompt(`${med.icon} ${med.name}: Nieuwe aantal?\n(max 70, nu: ${med.totalPills})`) || '0');
                if (amt < 1 || amt > 70) { alert('1-70!'); return; }
                
                const old = med.totalPills;
                med.totalPills = amt;
                med.resetDate = this.today();
                this.data.medicationIntakes = Object.fromEntries(
                    Object.entries(this.data.medicationIntakes).map(([d, m]) => {
                        const nm = { ...m };
                        delete nm[medId];
                        return [d, nm];
                    })
                );
                this.save();
                this.telegram_send(`🔄 <b>${med.icon} ${med.name} RESET</b>\n├─ ${old} → ${amt}\n├─ 📊 ${amt}/${amt}\n└─ 📅 ${this.today()}`);
                this.render();
            }

            recordMed(medId, time) {
                const med = this.data.medications.find(m => m.id === medId);
                if (!this.data.medicationIntakes[this.selectedDate]) this.data.medicationIntakes[this.selectedDate] = {};
                
                if (time) {
                    this.data.medicationIntakes[this.selectedDate][medId] = time;
                    this.telegram_send(
                        `✅ <b>${med.icon} ${med.name} INGENOMEN!</b>\n` +
                        `├─ ⏰ ${time}\n` +
                        `├─ 📊 ${this.getPills(medId)}/${med.totalPills}\n` +
                        `└─ ✅`
                    );
                    if (this.getPills(medId) < 5) {
                        this.telegram_send(`⚠️ <b>${med.icon} ${med.name} - WAARSCHUWING!</b>\n├─ ${this.getPills(medId)} pillen\n└─ 🚨 BESTELLEN!`);
                    }
                } else {
                    delete this.data.medicationIntakes[this.selectedDate][medId];
                }
                this.save();
                this.render();
            }

            saveMeasure(moment, sys, dia, hr) {
                if (!this.data.measurements[this.selectedDate]) this.data.measurements[this.selectedDate] = {};
                if (sys && dia && hr) {
                    this.data.measurements[this.selectedDate][moment] = { sys: parseInt(sys), dia: parseInt(dia), hartslag: parseInt(hr) };
                } else {
                    delete this.data.measurements[this.selectedDate][moment];
                }
                this.save();
            }

            colorStatus(sys, dia) {
                if (!sys || !dia) return 'empty';
                const s = parseInt(sys), d = parseInt(dia);
                if (isNaN(s) || isNaN(d)) return 'empty';
                if (s < 130 && d < 85) return 'green';
                if ((s >= 130 && s < 160) || (d >= 85 && d < 100)) return 'orange';
                return 'red';
            }

            updateBadge(moment) {
                const sys = document.querySelector(`.sys-${moment}`)?.value || '';
                const dia = document.querySelector(`.dia-${moment}`)?.value || '';
                const hr = document.querySelector(`.hartslag-${moment}`)?.value || '';
                const status = this.colorStatus(sys, dia);
                const badge = document.getElementById(`badge-${moment}`);
                if (badge) {
                    const color = status === 'green' ? '#10b981' : status === 'orange' ? '#f59e0b' : '#ef4444';
                    badge.innerHTML = status === 'empty' ? '❌' : `<span style="width: 8px; height: 8px; border-radius: 50%; background: ${color}; margin-right: 6px;"></span>${sys}/${dia}`;
                }
                if (sys && dia && hr) this.saveMeasure(moment, sys, dia, hr);
            }

            render() {
                document.getElementById('app').innerHTML = this.view === 'calendar' ? this.renderCalendar() : this.renderDay();
                this.attach();
            }

            renderCalendar() {
                const y = this.currentMonth.getFullYear(), m = this.currentMonth.getMonth();
                const months = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
                const days = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
                const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
                const daysInMonth = new Date(y, m + 1, 0).getDate();
                const today = this.today();
                let cal = '';

                for (let i = 0; i < firstDay; i++) cal += '<div></div>';
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${y}-${String(m + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    let cls = 'day-cell';
                    if (dateStr === today) cls += ' today';
                    cal += `<div class="${cls}" data-date="${dateStr}">${day}</div>`;
                }

                return `<div style="min-height: 100vh; background: #f9fafb; padding: 12px;">
                    <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border-radius: 16px; padding: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px;">
                        <img src="./logo.png" alt="Logo" style="width: 48px; height: 48px; border-radius: 12px; background: white; padding: 4px;">
                        <div style="flex: 1;">
                            <h1 style="font-size: 14px; font-weight: 700; margin: 0;">Bloeddruk/Medicatie</h1>
                            <p style="font-size: 10px; opacity: 0.9; margin: 2px 0 0 0;">Opvolgingstool (${this.data.medications.length} meds)</p>
                            <p style="font-size: 9px; opacity: 0.8; margin: 2px 0 0 0;">Made by Philippe De Meersman</p>
                        </div>
                        <div style="display: flex; gap: 6px;">
                            <button onclick="app.openTelegram()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">💬</button>
                            <button onclick="app.showSettings = !app.showSettings; app.render();" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">⚙️</button>
                            <button onclick="app.currentMonth = new Date(); app.render();" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">📅</button>
                        </div>
                    </div>

                    ${this.showSettings ? `<div style="background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);">
                        <h2 style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">💊 MEDICATIES</h2>
                        ${this.data.medications.map(med => `<div style="background: #f9fafb; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                            <div><div style="font-weight: 700;">${med.icon} ${med.name}</div><div style="font-size: 11px; color: #6b7280;">${med.dosage} • ${this.getPills(med.id)}/${med.totalPills}</div></div>
                            <div style="display: flex; gap: 6px;">
                                <button onclick="app.resetMed('${med.id}')" style="background: #3b82f6; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;">Reset</button>
                                <button onclick="app.removeMed('${med.id}')" style="background: #ef4444; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;">✕</button>
                            </div>
                        </div>`).join('')}
                        <button onclick="app.addMed()" style="background: #10b981; color: white; border: none; border-radius: 8px; padding: 8px 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 8px;">+ Toevoegen</button>
                    </div>` : ''}

                    ${this.data.medications.map(med => `<div style="background: white; border-radius: 12px; padding: 8px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                            <h2 style="font-size: 12px; font-weight: 700; margin: 0; color: ${med.color};">${med.icon} ${med.name}</h2>
                            <div style="font-size: 11px; font-weight: 600; color: ${this.getPills(med.id) > (med.totalPills / 10) ? '#10b981' : this.getPills(med.id) >= 5 ? '#f59e0b' : '#ef4444'};">
                                ${this.getPills(med.id) > (med.totalPills / 10) ? '✅' : this.getPills(med.id) >= 5 ? '⚠️' : '🚨'} ${this.getPills(med.id)}/${med.totalPills}
                            </div>
                        </div>
                        <div class="pill-grid" style="background: ${med.color}33; border-radius: 8px; padding: 8px; grid-template-columns: repeat(${Math.min(10, med.totalPills)}, 1fr);">
                            ${[...Array(med.totalPills)].map((_, i) => `<div style="font-size: 16px; opacity: ${i >= this.getPills(med.id) ? '0.3' : '1'}; filter: ${i >= this.getPills(med.id) ? 'grayscale(100%)' : 'none'};">${med.icon}</div>`).join('')}
                        </div>
                    </div>`).join('')}

                    <div style="display: flex; gap: 8px; margin-bottom: 12px;">
                        <button style="background: white; border: none; border-radius: 10px; width: 36px; height: 36px; font-size: 16px; cursor: pointer;" onclick="app.currentMonth.setMonth(app.currentMonth.getMonth() - 1); app.render();">◀</button>
                        <div style="flex: 1; text-align: center; font-size: 16px; font-weight: 700;">📅 ${months[m]} ${y}</div>
                        <button style="background: white; border: none; border-radius: 10px; width: 36px; height: 36px; font-size: 16px; cursor: pointer;" onclick="app.currentMonth.setMonth(app.currentMonth.getMonth() + 1); app.render();">▶</button>
                    </div>
                    <div style="background: white; border-radius: 12px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);">
                        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px;">
                            ${days.map(d => `<div style="text-align: center; font-weight: 600; color: #6b7280; font-size: 11px; padding: 6px 0;">${d}</div>`).join('')}
                        </div>
                        <div class="calendar-grid">${cal}</div>
                    </div>
                </div>`;
            }

            renderDay() {
                const [y, m, d] = this.selectedDate.split('-');
                const dayObj = new Date(this.selectedDate);
                const dayName = dayObj.toLocaleDateString('nl-NL', { weekday: 'short' });
                const mName = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'][m - 1];
                const meds = this.data.medicationIntakes?.[this.selectedDate] || {};
                const measures = this.data.measurements[this.selectedDate] || {};

                const renderMom = (moment, icon, time) => {
                    const data = measures[moment];
                    const sys = data?.sys || '', dia = data?.dia || '', hr = data?.hartslag || '';
                    const status = this.colorStatus(sys, dia);
                    return `<div class="blood-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div><div style="font-weight: 700; font-size: 14px;">${icon} ${moment.charAt(0).toUpperCase() + moment.slice(1)}</div><div style="font-size: 11px; color: #6b7280; margin-top: 2px;">${time}</div></div>
                            <div id="badge-${moment}" style="display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 16px; font-size: 12px; font-weight: 600; background: ${status === 'green' ? '#d1fae5' : status === 'orange' ? '#fed7aa' : status === 'red' ? '#fecaca' : '#f3f4f6'};">
                                ${status === 'empty' ? '❌' : `<span style="width: 6px; height: 6px; border-radius: 50%; background: ${status === 'green' ? '#10b981' : status === 'orange' ? '#f59e0b' : '#ef4444'}; margin-right: 4px;"></span>${sys}/${dia}`}
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="number" class="input-field sys-${moment}" placeholder="Sys" value="${sys}" oninput="app.updateBadge('${moment}');">
                            <input type="number" class="input-field dia-${moment}" placeholder="Dia" value="${dia}" oninput="app.updateBadge('${moment}');">
                            <input type="number" class="input-field hartslag-${moment}" placeholder="HR" value="${hr}" oninput="app.updateBadge('${moment}');">
                        </div>
                    </div>`;
                };

                return `<div style="min-height: 100vh; background: #f9fafb; padding: 12px 12px 100px 12px;">
                    <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border-radius: 16px; padding: 12px; margin-bottom: 12px;">
                        <button style="background: rgba(255,255,255,0.2); border: none; border-radius: 8px; width: 32px; height: 32px; color: white; font-size: 16px; cursor: pointer; margin-bottom: 8px;" onclick="app.view = 'calendar'; app.render();">◀</button>
                        <h1 style="font-size: 18px; font-weight: 700; margin: 0;">${dayName} ${d} ${mName}</h1>
                    </div>

                    ${this.data.medications.map(med => {
                        const time = meds[med.id] || '';
                        return `<div class="med-section" style="border-left-color: ${med.color};">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <div><h2 style="font-size: 14px; font-weight: 700; margin: 0; color: ${med.color};">${med.icon} ${med.name}</h2><div style="font-size: 11px; color: #6b7280;">${med.dosage}</div></div>
                                <span style="background: ${med.color}; color: white; padding: 3px 8px; border-radius: 12px; font-weight: 600; font-size: 12px;">${this.getPills(med.id)}/${med.totalPills}</span>
                            </div>
                            ${time ? `<div style="background: #d1fae5; border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 12px; color: #065f46; font-weight: 600;">✅ ${time}</div>` : `<div style="background: #fef3c7; border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 12px; color: #92400e; font-weight: 600;">⏰ Niet ingevuld</div>`}
                            <div style="display: flex; gap: 6px;">
                                <input type="time" class="input-field med-time-${med.id}" style="flex: 1;" value="${time || ''}">
                                <button style="padding: 10px 12px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;" onclick="app.recordMed('${med.id}', document.querySelector('.med-time-${med.id}').value);">💾</button>
                                <button style="padding: 10px 12px; background: ${med.color}; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;" onclick="app.recordMed('${med.id}', '');">✕</button>
                            </div>
                        </div>`;
                    }).join('')}

                    <h3 style="font-size: 14px; font-weight: 700; margin-top: 20px; margin-bottom: 10px;">❤️ BLOEDWAARDEN</h3>
                    ${renderMom('ochtend', '🌅', '8:00 AM')}
                    ${renderMom('middag', '☀️', '13:00')}
                    ${renderMom('avond', '🌙', '20:00')}
                </div>`;
            }

            attach() {
                if (this.view === 'calendar') {
                    document.querySelectorAll('.day-cell').forEach(cell => {
                        cell.addEventListener('click', () => { this.selectedDate = cell.dataset.date; this.view = 'day'; this.render(); });
                    });
                }
            }
        }

        const app = new HealthTracker();
    </script>
</body>
</html>
