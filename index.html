<body class="bg-gray-50">
    <div id="app"></div>
    <script>
        const MEDS_COLORS = ['#ff0000', '#0066ff', '#00cc00', '#ff6600', '#ff00ff'];
        const MEDS_ICONS = ['💊', '💉', '🩺', '🏥', '🔬'];
        const DOCTOR_DATA = {name:'Dr. Verbesselt Koen',address:'Wolvertemsesteenweg 115 - 1850 Grimbergen',phone:'02 269 12 54',hours:{ma_do:'07:00-19:30',vr:'07:00-18:30'}};
        function getBloodPressureStatus(s,d){if(s<=119&&d<=79)return{status:'🟢',color:'#10b981'};if(s<=129&&d<=84)return{status:'🟢',color:'#10b981'};if(s<=139||d<=89)return{status:'🟡',color:'#f59e0b'};if(s<=159||d<=99)return{status:'🟠',color:'#f97316'};if(s<=179||d<=109)return{status:'🔴',color:'#ef4444'};return{status:'🔴',color:'#dc2626'};}
        function getHeartRateStatus(h){if(h>=55&&h<=70)return{status:'🟢',color:'#10b981'};if(h>70&&h<=100)return{status:'🟢',color:'#10b981'};if(h>100&&h<=120)return{status:'🟡',color:'#f59e0b'};return{status:'🔴',color:'#dc2626'};}

        // ══════════════════════════════════════════════════════════
        // GOOGLE DRIVE - GLOBALE VARIABLES & FUNCTIES
        // ══════════════════════════════════════════════════════════
        const GDRIVE_CLIENT_ID = '333079195698-gt6gm0ra37e53ujd782424nea5e9iiqq.apps.googleusercontent.com';
        const GDRIVE_SCOPE = 'https://www.googleapis.com/auth/drive https://www.googleapis.com/auth/userinfo.profile'; // Full drive access!
        const GDRIVE_FOLDER_ID = '1flE6MFq5be0xCPpPJbyozIVTIZOhzu0X'; // SyncHealthapp folder
        const GDRIVE_FILE_NAME = 'healthapp-backup.json';

        let gTokenClient = null;
        let gAccessToken = null; // ALTIJD null bij start - localStorage negeren!
        let gTokenExpiry = 0;
        let gFileId = null;
        let gUserName = null;
        let gSyncing = false;
        let gLastSync = 0;

        function isGTokenValid() {
          if (!gAccessToken || gAccessToken === 'null' || gAccessToken === '') return false;
          if (!gTokenExpiry || gTokenExpiry <= 0) return false;
          return Date.now() < gTokenExpiry - 60000;
        }

        function initGoogleDrive() {
          // Clean invalid tokens at startup
          if (!gAccessToken || gAccessToken === 'null' || gAccessToken === '') {
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expiry');
            localStorage.removeItem('gdrive_user_name');
            gAccessToken = null;
            gTokenExpiry = 0;
            gUserName = null;
          }
          
          if (typeof google === 'undefined' || !google.accounts) {
            setTimeout(initGoogleDrive, 1000);
            return;
          }
          gTokenClient = google.accounts.oauth2.initTokenClient({
            client_id: GDRIVE_CLIENT_ID,
            scope: GDRIVE_SCOPE,
            callback: async (resp) => {
              if (resp.error) {
                alert('❌ Google login: ' + resp.error);
                return;
              }
              gAccessToken = resp.access_token;
              gTokenExpiry = Date.now() + (resp.expires_in * 1000);
              localStorage.setItem('gdrive_token', gAccessToken);
              localStorage.setItem('gdrive_token_expiry', String(gTokenExpiry));
              await fetchGUserInfo();
              app.sendTg('✅ Google Drive verbonden!');
              alert('✅ Google Drive verbonden!');
              app.show();
            }
          });
          if (isGTokenValid()) {
            app.show();
          }
        }

        async function fetchGUserInfo() {
          try {
            const r = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const d = await r.json();
            gUserName = d.name || d.email || 'Google';
            localStorage.setItem('gdrive_user_name', gUserName);
          } catch(e) { console.warn('userinfo:', e); }
        }

        function handleSyncAction() {
          if (isGTokenValid()) {
            gAccessToken = null;
            gTokenExpiry = 0;
            gUserName = null;
            localStorage.removeItem('gdrive_token');
            localStorage.removeItem('gdrive_token_expiry');
            localStorage.removeItem('gdrive_user_name');
            alert('✅ Google Drive ontkoppeld');
            app.show();
          } else {
            if (!gTokenClient) { alert('Google laden...'); return; }
            gTokenClient.requestAccessToken({ prompt: gUserName ? '' : 'consent' });
          }
        }

        async function driveSync() {
          if (!isGTokenValid()) { alert('Niet verbonden met Google Drive'); return; }
          if (gSyncing) return;
          gSyncing = true;
          try {
            const backup = {
              meds: app.data.meds,
              intakes: app.data.intakes,
              measures: app.data.measures,
              rapportages: app.data.rapportages || {},
              patient: app.data.patient || null,
              settings: app.settings,
              timestamp: new Date().toISOString()
            };
            const json = JSON.stringify(backup, null, 2);
            let fileId = localStorage.getItem('gdrive_file_id');
            
            if (fileId) {
              // UPDATE: DELETE old, CREATE new
              try {
                await fetch(`https://www.googleapis.com/drive/v3/files/${fileId}`, {
                  method: 'DELETE',
                  headers: { Authorization: `Bearer ${gAccessToken}` }
                });
              } catch(e) { console.warn('Delete failed:', e); }
              fileId = null;
            }
            
            // CREATE new file
            const meta = { name: GDRIVE_FILE_NAME, parents: [GDRIVE_FOLDER_ID] };
            const form = new FormData();
            form.append('metadata', new Blob([JSON.stringify(meta)], {type:'application/json'}));
            form.append('file', new Blob([json], {type:'application/json'}));
            
            const r = await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart', {
              method: 'POST',
              headers: { Authorization: `Bearer ${gAccessToken}` },
              body: form
            });
            
            if (!r.ok) throw new Error('Upload failed: ' + r.status);
            const created = await r.json();
            fileId = created.id;
            localStorage.setItem('gdrive_file_id', fileId);
            gFileId = fileId;
            gLastSync = Date.now();
            localStorage.setItem('gdrive_last_sync', String(gLastSync));
            
            app.sendTg('☁️ Backup gestuurd!');
            alert('✅ Backup gestuurd!');
          } catch(e) {
            console.error('Sync error:', e);
            alert('❌ Error: ' + e.message);
          } finally {
            gSyncing = false;
          }
        }

        async function driveRestore() {
          if (!isGTokenValid()) { alert('Niet verbonden met Google Drive'); return; }
          if (gSyncing) return;
          gSyncing = true;
          try {
            // Search for backup file in folder
            const q = `name='${GDRIVE_FILE_NAME}' and '${GDRIVE_FOLDER_ID}' in parents and trashed=false`;
            const searchUrl = `https://www.googleapis.com/drive/v3/files?q=${encodeURIComponent(q)}&spaces=drive&fields=files(id,name)`;
            const searchRes = await fetch(searchUrl, {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const searchData = await searchRes.json();
            
            if (!searchData.files || searchData.files.length === 0) {
              alert('❌ Backup bestand niet gevonden in Google Drive!');
              gSyncing = false;
              return;
            }
            
            const fileId = searchData.files[0].id;
            
            // Download file
            const downloadUrl = `https://www.googleapis.com/drive/v3/files/${fileId}?alt=media`;
            const downloadRes = await fetch(downloadUrl, {
              headers: { Authorization: `Bearer ${gAccessToken}` }
            });
            const jsonText = await downloadRes.text();
            const backup = JSON.parse(jsonText);
            
            // Restore data
            app.data.meds = backup.meds || [];
            app.data.intakes = backup.intakes || {};
            app.data.measures = backup.measures || {};
            app.data.rapportages = backup.rapportages || {};
            app.data.patient = backup.patient || null;
            app.settings = backup.settings || app.settings;
            app.save(); // CORRECT methode!
            
            app.sendTg('☁️ Backup hersteld van Google Drive!');
            alert('✅ Backup hersteld van Google Drive!');
            
            // Open folder in new window
            setTimeout(() => {
              window.open('https://drive.google.com/drive/folders/1flE6MFq5be0xCPpPJbyozIVTIZOhzu0X', '_blank');
            }, 500);
            
            app.show();
          } catch(e) {
            console.error('Drive restore error:', e);
            alert('❌ Restore error: ' + e.message);
          } finally {
            gSyncing = false;
          }
        }

        class App {
            constructor() {
                try {
                    const saved = localStorage.getItem('data');
                    this.data = saved ? JSON.parse(saved) : {
                        meds: [{ id: '1', name: 'Belsar', dosage: '20mg', pills: 49, color: '#ff0000', icon: '💊' }],

                        intakes: {},
                        measures: {},
                        patient: null
                    };
                }
                this.telegram = {token:'8525699360:AAGr4wYh4mj-7R2nJ0C7N5Qo3wKZtV7kzkw',chatId:'8526489078'};
                this.month = new Date();
                this.date = null;
                this.view = 'cal';
                this.showSet = false;
                this.settingsVisible = false;
                this.settings = JSON.parse(localStorage.getItem('settings') || JSON.stringify({
                    ochtendDeadline: '10:00',
                    middagDeadline: '13:00',
                    avondDeadline: '19:00',
                    medicatieCheck: '10:00',
                    rapportCheck: '21:00'
                }));
                // Laad huisarts gegevens uit localStorage, of gebruik default
                this.doctor = JSON.parse(localStorage.getItem('doctor') || JSON.stringify({
                    name: 'Dr. Verbesselt Koen',
                    address: 'Wolvertemsesteenweg 115 - 1850 Grimbergen',
                    phone: '02 269 12 54',
                    hours: { ma_do: '07:00-19:30', vr: '07:00-18:30' }
                }));
                this.show();
                
                // 🎨 EERST alles kleuren, DAARNA observer starten
                setTimeout(() => {
                    this.colorAllInputs();
                    
                    // MutationObserver - observeer DOM en kleur AUTOMATISCH wanneer inputs verschijnen!
                    const observer = new MutationObserver(() => {
                        this.colorAllInputs();
                    });
                    observer.observe(document.getElementById('app'), {
                        childList: true,
                        subtree: true
                    });
                }, 50);
            }

            save() {
                localStorage.setItem('data', JSON.stringify(this.data));
            }

            today() {
                const d = new Date();
                return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            }

            getPills(id) {
                let count = 0;
                const med = this.data.meds.find(m => m.id === id);
                if (!med) return 0;
                const perIntake = med.type === 'sporadic' ? (parseInt(med.pillsPerIntake) || 1) : 1;
                for (let day in this.data.intakes) {
                    if (this.data.intakes[day][id]) count += perIntake;
                }
                return Math.max(0, med.pills - count);
            }

            addMed(type = 'daily') {
                const isSporadic = type === 'sporadic';
                const name = prompt(isSporadic ? 'Naam sporadische medicatie:' : 'Naam dagelijkse medicatie:');
                if (!name) return;
                const dosage = prompt('Dosage:');
                if (!dosage) return;
                const p = parseInt(prompt('Pillen (1-70):') || '0');
                if (p < 1 || p > 70) { alert('1-70!'); return; }
                
                let pillsPerIntake = 1;
                if (isSporadic) {
                    pillsPerIntake = parseInt(prompt('Aantal pillen per inname:', '1') || '0');
                    if (pillsPerIntake < 1 || pillsPerIntake > p) { alert('Aantal per inname moet tussen 1 en ' + p + ' zijn!'); return; }
                }
                
                const med = {
                    id: Date.now().toString(),
                    name: name,
                    dosage: dosage,
                    pills: p,
                    type: isSporadic ? 'sporadic' : 'daily',
                    pillsPerIntake: isSporadic ? pillsPerIntake : 1,
                    color: MEDS_COLORS[this.data.meds.length % 5],
                    icon: MEDS_ICONS[this.data.meds.length % 5]
                };
                this.data.meds.push(med);
                this.save();
                if (isSporadic) {
                    this.sendTg(`${med.icon} <b>${med.name}</b> TOEGEVOEGD!
├─ 🔵 Sporadische medicatie
├─ ${med.dosage}
├─ ${med.pills} pillen voorraad
├─ 💊 ${med.pillsPerIntake} pillen per inname
└─ ✅`);
                } else {
                    this.sendTg(`${med.icon} <b>${med.name}</b> TOEGEVOEGD!
├─ 🟢 Dagelijkse medicatie
├─ ${med.dosage}
├─ ${med.pills} pillen
└─ ✅`);
                }
                this.show();
            }

            rmMed(id) {
                if (this.data.meds.length === 1) { alert('Min 1!'); return; }
                const med = this.data.meds.find(m => m.id === id);
                if (!confirm(`Verwijderen: ${med.name}?`)) return;
                this.data.meds = this.data.meds.filter(m => m.id !== id);
                this.save();
                this.sendTg(`🗑️ <b>${med.name}</b> VERWIJDERD`);
                this.show();
            }

            adjustMedStock(id) {
                const med = this.data.meds.find(m => m.id === id);
                if (!med) return;

                const current = this.getPills(id);
                const typeLabel = med.type === 'sporadic' ? '🔵 Sporadische medicatie' : '🟢 Dagelijkse medicatie';
                const choice = prompt(
                    `${med.name} - Voorraad aanpassen\n\n` +
                    `Huidige voorraad: ${current}/${med.pills}\n\n` +
                    `Kies een optie:\n` +
                    `1 = ➕ Pillen toevoegen\n` +
                    `2 = ➖ Pillen verwijderen\n` +
                    `3 = 📦 Nieuwe verpakking toevoegen`
                );
                if (!choice) return;

                if (choice === '1') {
                    const qty = parseInt(prompt('Hoeveel pillen toevoegen?', '1') || '0');
                    if (qty < 1 || qty > 500) { alert('Aantal moet tussen 1 en 500 zijn!'); return; }
                    const oldCurrent = this.getPills(id);
                    med.pills = (parseInt(med.pills) || 0) + qty;
                    const newCurrent = this.getPills(id);
                    this.save();
                    this.sendTg(`📦 <b>${med.name}</b> - VOORRAAD AANGEPAST\n├─ ${typeLabel}\n├─ ➕ ${qty} pillen toegevoegd\n├─ ${oldCurrent} → ${newCurrent}\n└─ ✅`);
                    this.show();
                    return;
                }

                if (choice === '2') {
                    const qty = parseInt(prompt('Hoeveel pillen verwijderen?', '1') || '0');
                    if (qty < 1 || qty > 500) { alert('Aantal moet tussen 1 en 500 zijn!'); return; }
                    const oldCurrent = this.getPills(id);
                    if (qty > oldCurrent) {
                        alert(`Je kan geen ${qty} pillen verwijderen.\nHuidige voorraad = ${oldCurrent}.`);
                        return;
                    }
                    med.pills = (parseInt(med.pills) || 0) - qty;
                    const newCurrent = this.getPills(id);
                    this.save();
                    this.sendTg(`📦 <b>${med.name}</b> - VOORRAAD AANGEPAST\n├─ ${typeLabel}\n├─ ➖ ${qty} pillen verwijderd\n├─ ${oldCurrent} → ${newCurrent}\n└─ ✅`);
                    this.show();
                    return;
                }

                if (choice === '3') {
                    const qty = parseInt(prompt('Hoeveel pillen zitten er in de nieuwe verpakking?', '28') || '0');
                    if (qty < 1 || qty > 500) { alert('Aantal moet tussen 1 en 500 zijn!'); return; }
                    const oldCurrent = this.getPills(id);
                    med.pills = (parseInt(med.pills) || 0) + qty;
                    const newCurrent = this.getPills(id);
                    this.save();
                    this.sendTg(`📦 <b>${med.name}</b> - NIEUWE VERPAKKING\n├─ ${typeLabel}\n├─ 📦 Nieuwe verpakking: ${qty} pillen\n├─ ${oldCurrent} → ${newCurrent}\n└─ ✅`);
                    this.show();
                    return;
                }

                alert('Ongeldige keuze. Kies 1, 2 of 3.');
            }

            setIntake(id, time) {
                if (!this.data.intakes[this.date]) this.data.intakes[this.date] = {};

            sendReport() {
                const rapport = this.generateReport();
                if (!rapport) return;
                
                const msg = '📊 DAGELIJKS RAPPORT - ' + rapport.date + '\n\n🌅 Ochtend: ' + rapport.measurements.ochtend + '\n🌤️ Middag: ' + rapport.measurements.middag + '\n🌙 Avond: ' + rapport.measurements.avond + '\n\nGemiddelden: ' + rapport.averages.sys + '/' + rapport.averages.dia + ' (HR:' + rapport.averages.hr + ')\n\n' + rapport.status.esc + '\n' + rapport.status.thuis + '\n\n' + rapport.message;
                this.sendTg(msg);

            generateReport() {
                const today = new Date().toISOString().split('T')[0];
                const measures = this.data.measures[today] || {};
                
                if (!measures.ochtend && !measures.middag && !measures.avond) return null;
                
                const o = measures.ochtend;
                const m = measures.middag;
                const a = measures.avond;
                
                let sL = [];
                let dL = [];
                let hL = [];
                if (o) { sL.push(o.sys); dL.push(o.dia); hL.push(o.hr); }
                if (m) { sL.push(m.sys); dL.push(m.dia); hL.push(m.hr); }
                if (a) { sL.push(a.sys); dL.push(a.dia); hL.push(a.hr); }
                
                const avgS = Math.round(sL.reduce((x,y) => x+y, 0) / sL.length);
                const avgD = Math.round(dL.reduce((x,y) => x+y, 0) / dL.length);
                const avgH = Math.round(hL.reduce((x,y) => x+y, 0) / hL.length);
                
                let esc, thuis, msg;
                if (avgS < 120 && avgD < 80) { esc = '✅ NORMAAL'; thuis = '🟢 GOED'; msg = 'Fantastisch!'; }
                else if (avgS < 135 && avgD < 85) { esc = '🟡 VERHOOGD'; thuis = '🟡 ATTENTIE'; msg = 'Prima!'; }
                else if (avgS < 140 && avgD < 90) { esc = '🟠 HYPERTENSIE 1'; thuis = '🟠 ALERT'; msg = 'Let op!'; }
                else { esc = '🔴 HYPERTENSIE 2'; thuis = '🔴 KRITISCH'; msg = 'Neem contact arts!'; }
                
                const r = {
                    date: today,
                    measurements: { ochtend: o ? o.sys + '/' + o.dia + ' (HR:' + o.hr + ') @ ' + o.time : 'Niet ingegeven', middag: m ? m.sys + '/' + m.dia + ' (HR:' + m.hr + ') @ ' + m.time : 'Niet ingegeven', avond: a ? a.sys + '/' + a.dia + ' (HR:' + a.hr + ') @ ' + a.time : 'Niet ingegeven' },
                    averages: { sys: avgS, dia: avgD, hr: avgH },
                    status: { esc: esc, thuis: thuis },
                    message: msg
                };
                
                this.data.rapportages = this.data.rapportages || {};
                this.data.rapportages[today] = r;
                localStorage.setItem('data', JSON.stringify(this.data));
                return r;
            }

                        try {
                            const backup = JSON.parse(event.target.result);
                            this.data.meds = backup.meds || [];
                            this.data.intakes = backup.intakes || {};
                            this.data.measures = backup.measures || {};
                            this.data.rapportages = backup.rapportages || {};
                            this.settings = backup.settings || this.settings;
                            localStorage.setItem('data', JSON.stringify(this.data));
                            localStorage.setItem('settings', JSON.stringify(this.settings));
                            this.show();
                        } catch(err) {
                            console.error('Error:', err);
                        }
                    };
                    reader.readAsText(file);
                };
                input.click();
            }

                const rood_dia = parseInt(localStorage.getItem('alarm_bp_rood_dia') || '109');
                
                const hr_min = parseInt(localStorage.getItem('alarm_hr_groen_min') || '55');

                // HR KLEUREN - JUISTE LOGICA!

            getAlarmThresholds() {
                return {
                    groenSys: parseInt(localStorage.getItem('alarm_bp_groen_sys') || '129'),
                    geelSys: parseInt(localStorage.getItem('alarm_bp_geel_sys') || '139'),
                    oranjeSys: parseInt(localStorage.getItem('alarm_bp_oranje_sys') || '159'),
                    roodSys: parseInt(localStorage.getItem('alarm_bp_rood_sys') || '179'),
                    groenDia: parseInt(localStorage.getItem('alarm_bp_groen_dia') || '84'),
                    geelDia: parseInt(localStorage.getItem('alarm_bp_geel_dia') || '89'),
                    oranjeDia: parseInt(localStorage.getItem('alarm_bp_oranje_dia') || '99'),
                    roodDia: parseInt(localStorage.getItem('alarm_bp_rood_dia') || '109'),
                    hrMin: parseInt(localStorage.getItem('alarm_hr_groen_min') || '55'),
                    hrGroenMax: parseInt(localStorage.getItem('alarm_hr_groen_max') || '100'),
                    hrGeelMax: parseInt(localStorage.getItem('alarm_hr_geel_max') || '120')
                };
            }

            getVitalLevelInfo(type, value) {
                const t = this.getAlarmThresholds();

                if (type === 'sys') {
                    if (value <= t.groenSys) return { level: 'green' };
                    if (value <= t.geelSys) return {
                        level: 'yellow',
                        key: 'sys',
                        icon: '🟡',
                        color: '#f59e0b',
                        name: 'Bovendruk (SYS)',
                        unit: 'mmHg',
                        value: value,
                        short: 'verhoogde bovendruk',
                        explanation: `Waarde ${value} mmHg ligt boven de groene grens (${t.groenSys}) en valt in de gele zone (tot ${t.geelSys}).`
                    };
                    if (value <= t.roodSys) return {
                        level: 'orange',
                        key: 'sys',
                        icon: '🟠',
                        color: '#ea580c',
                        name: 'Bovendruk (SYS)',
                        unit: 'mmHg',
                        value: value,
                        short: 'hoge bovendruk',
                        explanation: `Waarde ${value} mmHg ligt boven de gele grens (${t.geelSys}) en blijft onder de rode grens (${t.roodSys}).`
                    };
                    return {
                        level: 'red',
                        key: 'sys',
                        icon: '🔴',
                        color: '#dc2626',
                        name: 'Bovendruk (SYS)',
                        unit: 'mmHg',
                        value: value,
                        short: 'kritieke bovendruk',
                        explanation: `Waarde ${value} mmHg overschrijdt de rode grens (${t.roodSys}).`
                    };
                }

                if (type === 'dia') {
                    if (value <= t.groenDia) return { level: 'green' };
                    if (value <= t.geelDia) return {
                        level: 'yellow',
                        key: 'dia',
                        icon: '🟡',
                        color: '#f59e0b',
                        name: 'Onderdruk (DIA)',
                        unit: 'mmHg',
                        value: value,
                        short: 'verhoogde onderdruk',
                        explanation: `Waarde ${value} mmHg ligt boven de groene grens (${t.groenDia}) en valt in de gele zone (tot ${t.geelDia}).`
                    };
                    if (value <= t.roodDia) return {
                        level: 'orange',
                        key: 'dia',
                        icon: '🟠',
                        color: '#ea580c',
                        name: 'Onderdruk (DIA)',
                        unit: 'mmHg',
                        value: value,
                        short: 'hoge onderdruk',
                        explanation: `Waarde ${value} mmHg ligt boven de gele grens (${t.geelDia}) en blijft onder de rode grens (${t.roodDia}).`
                    };
                    return {
                        level: 'red',
                        key: 'dia',
                        icon: '🔴',
                        color: '#dc2626',
                        name: 'Onderdruk (DIA)',
                        unit: 'mmHg',
                        value: value,
                        short: 'kritieke onderdruk',
                        explanation: `Waarde ${value} mmHg overschrijdt de rode grens (${t.roodDia}).`
                    };
                }

                if (type === 'hr') {
                    if (value >= t.hrMin && value <= t.hrGroenMax) return { level: 'green' };
                    if (value < t.hrMin) return {
                        level: 'red',
                        key: 'hr',
                        icon: '🔴',
                        color: '#dc2626',
                        name: 'Hartslag',
                        unit: 'bpm',
                        value: value,
                        short: 'kritiek lage hartslag',
                        explanation: `Hartslag ${value} bpm ligt onder de minimumgrens (${t.hrMin}).`
                    };
                    if (value <= t.hrGeelMax) return {
                        level: 'yellow',
                        key: 'hr',
                        icon: '🟡',
                        color: '#f59e0b',
                        name: 'Hartslag',
                        unit: 'bpm',
                        value: value,
                        short: 'verhoogde hartslag',
                        explanation: `Hartslag ${value} bpm ligt boven de groene bovengrens (${t.hrGroenMax}) en valt in de gele zone (tot ${t.hrGeelMax}).`
                    };
                    return {
                        level: 'red',
                        key: 'hr',
                        icon: '🔴',
                        color: '#dc2626',
                        name: 'Hartslag',
                        unit: 'bpm',
                        value: value,
                        short: 'kritieke hartslag',
                        explanation: `Hartslag ${value} bpm overschrijdt de rode grens (${t.hrGeelMax}).`
                    };
                }

                return { level: 'green' };
            }

            getAbnormalVitals(sys, dia, hr) {
                const values = [
                    this.getVitalLevelInfo('sys', sys),
                    this.getVitalLevelInfo('dia', dia),
                    this.getVitalLevelInfo('hr', hr)
                ];
                return values.filter(v => v.level && v.level !== 'green');
            }

            getAlarmLevel(sys, dia, hr) {
                const order = { green: 0, yellow: 1, orange: 2, red: 3 };
                return this.getAbnormalVitals(sys, dia, hr).reduce((highest, item) => {
                    return order[item.level] > order[highest] ? item.level : highest;
                }, 'green');
            }

            buildPersonalAlarmTitle(patientName, level, abnormalVitals) {
                const redCount = abnormalVitals.filter(v => v.level === 'red').length;
                const orangeCount = abnormalVitals.filter(v => v.level === 'orange').length;
                const name = patientName || 'Patiënt';

                if (abnormalVitals.length > 1) {
                    if (redCount > 0) return `🚨 ${name}, meerdere vitale waarden vereisen onmiddellijke aandacht`;
                    if (orangeCount > 0) return `🟠 ${name}, meerdere waarden vragen extra aandacht`;
                    return `🟡 ${name}, meerdere waarden zijn verhoogd`;
                }

                const v = abnormalVitals[0];
                if (!v) return `${name}, waarden gecontroleerd`;

                if (v.level === 'red') return `🚨 ${name}, uw ${v.short} vraagt onmiddellijke aandacht`;
                if (v.level === 'orange') return `🟠 ${name}, uw ${v.short} vraagt extra aandacht`;
                return `🟡 ${name}, uw ${v.short} moet opgevolgd worden`;
            }

            getMomentIndex(moment) {
                const order = { ochtend: 1, middag: 2, avond: 3 };
                return order[moment] || 9;
            }

            getMeasurementOrder(date, moment) {
                return `${date}-${String(this.getMomentIndex(moment)).padStart(2, '0')}`;
            }

            getAllPreviousMeasurements(currentDate, currentMoment, limit = 4) {
                const measures = this.data.measures || {};
                const currentOrder = this.getMeasurementOrder(currentDate, currentMoment);
                const entries = [];

                Object.keys(measures).forEach(date => {
                    const day = measures[date] || {};
                    ['ochtend', 'middag', 'avond'].forEach(moment => {
                        const m = day[moment];
                        if (!m || !m.sys || !m.dia || !m.hr) return;
                        if (date === currentDate && moment === currentMoment) return;
                        const order = this.getMeasurementOrder(date, moment);
                        if (order >= currentOrder) return;
                        entries.push({
                            date,
                            moment,
                            time: m.time || '',
                            sys: parseInt(m.sys),
                            dia: parseInt(m.dia),
                            hr: parseInt(m.hr),
                            order
                        });
                    });
                });

                return entries
                    .filter(e => !isNaN(e.sys) && !isNaN(e.dia) && !isNaN(e.hr))
                    .sort((a, b) => b.order.localeCompare(a.order))
                    .slice(0, limit);
            }

            getPreviousMeasurement(currentDate, currentMoment) {
                return this.getAllPreviousMeasurements(currentDate, currentMoment, 1)[0] || null;
            }

            formatMeasurementLabel(entry) {
                if (!entry) return '';
                const parts = String(entry.date || '').split('-');
                const dateLabel = parts.length === 3 ? `${parts[2]}-${parts[1]}-${parts[0]}` : entry.date;
                const momentLabel = entry.moment === 'ochtend' ? 'ochtend' : entry.moment === 'middag' ? 'middag' : entry.moment === 'avond' ? 'avond' : 'meting';
                return `${dateLabel} ${momentLabel}${entry.time ? ' om ' + entry.time : ''}`;
            }

            getLevelForSingleValue(type, value) {
                const info = this.getVitalLevelInfo(type, parseInt(value));
                return info.level || 'green';
            }

            getAlarmLevelForMeasurement(m) {
                if (!m) return 'green';
                const order = { green: 0, yellow: 1, orange: 2, red: 3 };
                const levels = [
                    this.getLevelForSingleValue('sys', m.sys),
                    this.getLevelForSingleValue('dia', m.dia),
                    this.getLevelForSingleValue('hr', m.hr)
                ];
                return levels.reduce((highest, lvl) => order[lvl] > order[highest] ? lvl : highest, 'green');
            }

            getLevelLabel(level) {
                return { green: 'groene', yellow: 'gele', orange: 'oranje', red: 'rode' }[level] || 'onbekende';
            }

            getLevelIcon(level) {
                return { green: '🟢', yellow: '🟡', orange: '🟠', red: '🔴' }[level] || '⚪';
            }

            getDeltaWord(diff, key) {
                if (diff === 0) return 'gelijk gebleven';
                if (key === 'hr') return diff > 0 ? 'gestegen' : 'gedaald';
                return diff > 0 ? 'gestegen' : 'gedaald';
            }

            buildVitalComparisonText(vital, previous) {
                if (!previous || !vital || !vital.key || previous[vital.key] === undefined || isNaN(previous[vital.key])) {
                    return 'Geen vorige meting beschikbaar om mee te vergelijken.';
                }
                const oldValue = parseInt(previous[vital.key]);
                const diff = vital.value - oldValue;
                const unit = vital.unit || '';
                const prevLabel = this.formatMeasurementLabel(previous);
                if (diff === 0) {
                    return `Onveranderd tegenover de vorige meting (${prevLabel}): opnieuw ${vital.value} ${unit}.`;
                }
                const direction = this.getDeltaWord(diff, vital.key);
                const sign = diff > 0 ? '+' : '−';
                let nuance = '';
                if (Math.abs(diff) >= (vital.key === 'hr' ? 25 : 20)) nuance = ' Dit is een duidelijke verandering.';
                if (Math.abs(diff) >= (vital.key === 'hr' ? 40 : 35)) nuance = ' Dit is een zeer grote verandering.';
                return `Tegenover de vorige meting (${prevLabel}) is deze waarde ${direction}: ${oldValue} → ${vital.value} ${unit} (${sign}${Math.abs(diff)}).${nuance}`;
            }

            buildOverallComparisonText(current, previous, displayName) {
                if (!previous) {
                    return `${displayName}, dit is de eerste bruikbare meting vóór deze waarschuwing. Er is nog geen vorige meting om mee te vergelijken.`;
                }
                const diffs = {
                    sys: parseInt(current.sys) - parseInt(previous.sys),
                    dia: parseInt(current.dia) - parseInt(previous.dia),
                    hr: parseInt(current.hr) - parseInt(previous.hr)
                };
                const labels = { sys: 'bovendruk', dia: 'onderdruk', hr: 'hartslag' };
                const parts = ['sys', 'dia', 'hr'].map(key => {
                    const diff = diffs[key];
                    if (diff === 0) return `${labels[key]} gelijk`;
                    return `${labels[key]} ${diff > 0 ? 'gestegen' : 'gedaald'} met ${Math.abs(diff)}`;
                });
                return `${displayName}, vergeleken met de voorlaatste meting (${this.formatMeasurementLabel(previous)}) is de ${parts.join(', ')}.`;
            }

            classifyComparison(current, previous, history, level) {
                if (!previous) return { icon: 'ℹ️', title: 'Geen vergelijking mogelijk', text: 'Er is nog geen vorige volledige meting gevonden. De waarschuwing is daarom alleen gebaseerd op de huidige waarden.' };

                const ds = parseInt(current.sys) - parseInt(previous.sys);
                const dd = parseInt(current.dia) - parseInt(previous.dia);
                const dh = parseInt(current.hr) - parseInt(previous.hr);
                const bpScore = ds + dd;
                const allDown = ds < 0 && dd < 0 && dh <= 0;
                const allUp = ds > 0 && dd > 0 && dh >= 0;
                const stable = Math.abs(ds) <= 3 && Math.abs(dd) <= 3 && Math.abs(dh) <= 5;
                const strongWorse = ds >= 20 || dd >= 12 || dh >= 25;
                const extreme = ds >= 50 || dd >= 25 || dh >= 40;
                const strongBetter = ds <= -15 || dd <= -10 || dh <= -20;
                const prevLevel = this.getAlarmLevelForMeasurement(previous);
                const levelOrder = { green: 0, yellow: 1, orange: 2, red: 3 };
                const zoneUp = levelOrder[level] > levelOrder[prevLevel];
                const zoneDown = levelOrder[level] < levelOrder[prevLevel];

                if (extreme) return { icon: '🚨', title: 'Uitzonderlijk grote stijging', text: `De verandering tegenover de vorige meting is uitzonderlijk groot: SYS ${previous.sys} → ${current.sys}, DIA ${previous.dia} → ${current.dia}, HR ${previous.hr} → ${current.hr}. Controleer onmiddellijk opnieuw na rust.` };
                if (zoneUp && level === 'red') return { icon: '🔴', title: 'Overgang naar rode zone', text: `De vorige meting zat in de ${this.getLevelLabel(prevLevel)} zone. Deze meting komt uit in de rode zone. Dat is een duidelijke verslechtering.` };
                if (zoneDown) return { icon: '✅', title: 'Zone verbetert', text: `De vorige meting zat in de ${this.getLevelLabel(prevLevel)} zone. Deze meting zit nu in de ${this.getLevelLabel(level)} zone. Dat is een gunstige evolutie, ook al blijft opvolging nodig.` };
                if (strongWorse || allUp) return { icon: '⚠️', title: 'Duidelijke verslechtering', text: `De huidige meting is slechter dan de vorige: SYS ${previous.sys} → ${current.sys} (${ds >= 0 ? '+' : ''}${ds}), DIA ${previous.dia} → ${current.dia} (${dd >= 0 ? '+' : ''}${dd}), HR ${previous.hr} → ${current.hr} (${dh >= 0 ? '+' : ''}${dh}).` };
                if (allDown || strongBetter) return { icon: '✅', title: 'Positieve evolutie', text: `De waarden verbeteren tegenover de vorige meting: SYS ${previous.sys} → ${current.sys}, DIA ${previous.dia} → ${current.dia}, HR ${previous.hr} → ${current.hr}. De trend gaat de goede richting uit.` };
                if (stable) return { icon: '➖', title: 'Vrij stabiel', text: 'De meting verschilt nauwelijks van de vorige. De waarden blijven dus ongeveer op hetzelfde niveau.' };
                if (ds > 8 && Math.abs(dd) <= 5) return { icon: '🟡', title: 'Vooral bovendruk stijgt', text: `Vooral de bovendruk is gestegen: ${previous.sys} → ${current.sys} (+${ds}). De onderdruk verandert weinig.` };
                if (dd > 6 && Math.abs(ds) <= 8) return { icon: '🟡', title: 'Vooral onderdruk stijgt', text: `Vooral de onderdruk is gestegen: ${previous.dia} → ${current.dia} (+${dd}). Hou de volgende meting goed in de gaten.` };
                if (dh > 15 && bpScore <= 8) return { icon: '❤️', title: 'Vooral hartslag stijgt', text: `De bloeddruk verandert weinig, maar de hartslag stijgt van ${previous.hr} naar ${current.hr} bpm (+${dh}). Rust even en controleer opnieuw.` };
                if (dh < -15 && Math.abs(bpScore) <= 12) return { icon: '❤️', title: 'Hartslag verbetert', text: `De bloeddruk blijft ongeveer gelijk, maar de hartslag daalt van ${previous.hr} naar ${current.hr} bpm. Dat is gunstig.` };
                if (bpScore < -8 && dh > 12) return { icon: '⚖️', title: 'Gemengd beeld', text: 'De bloeddruk verbetert, maar de hartslag stijgt. Daarom blijft opvolging nodig.' };
                if (bpScore > 8 && dh < -12) return { icon: '⚖️', title: 'Gemengd beeld', text: 'De hartslag verbetert, maar de bloeddruk stijgt. Daarom blijft een nieuwe controle belangrijk.' };

                return { icon: '📊', title: 'Gemengde evolutie', text: `Er is geen eenduidige verbetering of verslechtering: SYS ${previous.sys} → ${current.sys}, DIA ${previous.dia} → ${current.dia}, HR ${previous.hr} → ${current.hr}.` };
            }

            buildThreeMeasurementTrend(current, history) {
                if (!history || history.length < 2) return '';
                const series = [current, ...history.slice(0, 2)].reverse();
                const sysDown = series[0].sys > series[1].sys && series[1].sys > series[2].sys;
                const diaDown = series[0].dia > series[1].dia && series[1].dia > series[2].dia;
                const sysUp = series[0].sys < series[1].sys && series[1].sys < series[2].sys;
                const diaUp = series[0].dia < series[1].dia && series[1].dia < series[2].dia;
                const hrDown = series[0].hr > series[1].hr && series[1].hr > series[2].hr;
                const hrUp = series[0].hr < series[1].hr && series[1].hr < series[2].hr;

                if (sysDown && diaDown) return '📉 Over de laatste 3 metingen daalt de bloeddruk stap voor stap. Dat is een gunstige trend.';
                if (sysUp && diaUp) return '📈 Over de laatste 3 metingen stijgt de bloeddruk stap voor stap. Dat verdient extra aandacht.';
                if (hrUp && !(sysUp && diaUp)) return '❤️ Over de laatste 3 metingen stijgt vooral de hartslag. Controleer of dit samenhangt met inspanning, stress, pijn of klachten.';
                if (hrDown && !(sysDown && diaDown)) return '❤️ Over de laatste 3 metingen daalt vooral de hartslag. Dat kan gunstig zijn als u zich goed voelt.';
                return '';
            }

            buildSmartComparisonHtml(current, previous, history, displayName, level) {
                const c = this.classifyComparison(current, previous, history, level);
                const trend = this.buildThreeMeasurementTrend(current, history);
                return `
                    <div><strong>${c.icon} ${c.title}</strong></div>
                    <div style="margin-top:6px;">${c.text}</div>
                    ${trend ? `<div style="margin-top:8px;"><strong>Trend:</strong> ${trend}</div>` : ''}
                `;
            }

            getCriticalEmergencyReasons(sys, dia, hr, previousMeasurement) {
                const reasons = [];
                const s = parseInt(sys);
                const d = parseInt(dia);
                const h = parseInt(hr);

                if (s >= 200) reasons.push({ icon: '🩸', label: 'Bovendruk extreem hoog', detail: `SYS ${s} mmHg is uitzonderlijk hoog.` });
                if (d >= 120) reasons.push({ icon: '🩸', label: 'Onderdruk extreem hoog', detail: `DIA ${d} mmHg is uitzonderlijk hoog.` });
                if (h >= 140) reasons.push({ icon: '❤️', label: 'Hartslag extreem hoog', detail: `Hartslag ${h} bpm is uitzonderlijk hoog.` });

                if (previousMeasurement) {
                    const ds = s - parseInt(previousMeasurement.sys);
                    const dd = d - parseInt(previousMeasurement.dia);
                    const dh = h - parseInt(previousMeasurement.hr);
                    if (ds >= 40) reasons.push({ icon: '📈', label: 'Bovendruk stijgt zeer sterk', detail: `SYS ${previousMeasurement.sys} → ${s} mmHg (+${ds}).` });
                    if (dd >= 25) reasons.push({ icon: '📈', label: 'Onderdruk stijgt zeer sterk', detail: `DIA ${previousMeasurement.dia} → ${d} mmHg (+${dd}).` });
                    if (dh >= 40) reasons.push({ icon: '📈', label: 'Hartslag stijgt zeer sterk', detail: `HR ${previousMeasurement.hr} → ${h} bpm (+${dh}).` });
                }

                return reasons;
            }

            checkCriticalEmergency(sys, dia, hr, time, moment, previousMeasurement) {
                const reasons = this.getCriticalEmergencyReasons(sys, dia, hr, previousMeasurement);
                if (!reasons.length) return;
                this.showCriticalEmergencyPopup({ sys, dia, hr, time, moment, previousMeasurement, reasons });

                    const values = [];
                    ['ochtend','middag','avond'].forEach(moment => {
                        if (day[moment] && day[moment].sys && day[moment].dia) {
                            values.push({ sys: parseInt(day[moment].sys), dia: parseInt(day[moment].dia) });
                        }
                    });
                    if (!values.length) return null;
                    return {
                        sys: Math.round(values.reduce((s, v) => s + v.sys, 0) / values.length),
                        dia: Math.round(values.reduce((s, v) => s + v.dia, 0) / values.length)
                    };
                };
                const getMedBpPoints = (med) => {
                    const intakeDates = getMedIntakeDates(med.id);
                    const startDate = intakeDates.length ? intakeDates[0] : (reportDates[0] || null);
                    if (!startDate) return [];
                    const points = reportDates
                        .filter(d => d >= startDate)
                        .map(d => {
                            const avg = getDailyBpForDate(d);
                            if (!avg) return null;
                            const [y, m, day] = d.split('-');
                            return { label: `${day}/${m}`, sys: avg.sys, dia: avg.dia };
                        })
                        .filter(Boolean);
                    return points.slice(-21);
                };
                const getSporadicUsagePoints = (med) => {
                    const counts = {};
                    getMedIntakeDates(med.id).forEach(date => {
                        counts[date] = (counts[date] || 0) + 1;
                    });
                    return Object.keys(counts).sort().slice(-12).map(date => {
                        const [y, m, d] = date.split('-');
                        return { label: `${d}/${m}`, count: counts[date] };
                    });
                };
                const registerMedChart = (config) => {
                    medChartConfigs.push(config);
                };

                const getBpEffectHtml = (med) => {
                    const intakeDates = getMedIntakeDates(med.id);
                    const startDate = intakeDates.length ? intakeDates[0] : (reportDates[0] || null);
                    if (!startDate || reportDates.length < 8) {
                        return `<div class="med-effect muted">📈 Effect op bloeddruk: onvoldoende gegevens</div>`;
                    }
                    const start = new Date(startDate);
                    const firstWeekDates = reportDates.filter(d => {
                        const x = new Date(d);
                        return x >= start && x <= new Date(start.getTime() + 6 * 86400000);
                    });
                    const lastWeekDates = reportDates.slice(-7);
                    const firstAvg = getBpAverageForDates(firstWeekDates);
                    const lastAvg = getBpAverageForDates(lastWeekDates);
                    if (!firstAvg || !lastAvg || firstAvg.count < 2 || lastAvg.count < 2) {
                        return `<div class="med-effect muted">📈 Effect op bloeddruk: onvoldoende metingen</div>`;
                    }
                    const sysDiff = lastAvg.sys - firstAvg.sys;
                    const diaDiff = lastAvg.dia - firstAvg.dia;
                    const arrow = (sysDiff < 0 || diaDiff < 0) ? '↘️' : (sysDiff > 0 || diaDiff > 0 ? '↗️' : '➡️');
                    const diffText = `${sysDiff > 0 ? '+' : ''}${sysDiff} / ${diaDiff > 0 ? '+' : ''}${diaDiff}`;
                    return `
                        <div class="med-effect">
                            <div class="effect-title">📈 Bloeddruktrend in rapportperiode</div>
                            <div class="effect-row"><span>Startweek</span><strong>${firstAvg.sys}/${firstAvg.dia}</strong></div>
                            <div class="effect-row"><span>Laatste week</span><strong>${lastAvg.sys}/${lastAvg.dia}</strong></div>
                            <div class="effect-row"><span>Verschil</span><strong>${arrow} ${diffText} mmHg</strong></div>
                        </div>`;
                };

                const renderDailyMedCard = (med) => {
                    const adh = getDailyAdherence(med);
                    const cls = getAdherenceClass(adh.rate);
                    const last = getLastMedIntake(med.id);
                    const status = getMedStatus(med);
                    const bpPoints = getMedBpPoints(med);
                    let miniChartHtml = '';
                    if (bpPoints.length >= 3) {
                        const chartId = safeChartId('dailyMedBpChart', med.id);
                        registerMedChart({
                            id: chartId,
                            type: 'dailyBp',
                            labels: bpPoints.map(p => p.label),
                            sys: bpPoints.map(p => p.sys),
                            dia: bpPoints.map(p => p.dia),
                            name: med.name
                        });
                        miniChartHtml = `<div class="med-mini-chart"><div class="mini-chart-title">❤️ Bloeddruktrend sinds eerste registratie</div><canvas id="${chartId}" height="95"></canvas></div>`;
                    } else {
                        miniChartHtml = `<div class="med-mini-chart empty">📈 Nog te weinig meetpunten voor medicatiegrafiek</div>`;
                    }
                    return `
                        <div class="med-report-card daily">
                            <div class="med-card-top">
                                <div>
                                    <div class="med-type-badge daily">🟢 DAGELIJKS</div>
                                    <h3>${med.icon || '💊'} ${med.name}</h3>
                                    <p class="med-dose">${med.dosage || ''}</p>
                                </div>
                                <div class="med-status">${status}</div>
                            </div>
                            <div class="therapy-line">
                                <div class="therapy-head"><span>Therapietrouw</span><strong>${adh.label}</strong></div>
                                <div class="therapy-bar"><div class="therapy-fill ${cls}" style="width:${Math.max(0, Math.min(100, adh.rate))}%;"></div></div>
                                <div class="therapy-detail">${adh.taken}/${adh.expected} geregistreerde dagen</div>
                            </div>
                            <div class="med-meta-grid">
                                <div><span>Laatste inname</span><strong>${last.date ? `${formatShortReportDate(last.date)} ${last.time || ''}` : 'Niet geregistreerd'}</strong></div>
                                <div><span>Sinds</span><strong>${adh.firstDate ? formatShortReportDate(adh.firstDate) : 'Niet geregistreerd'}</strong></div>
                            </div>
                            ${miniChartHtml}
                            ${getBpEffectHtml(med)}
                        </div>`;
                };

                const renderSporadicMedCard = (med) => {
                    const last = getLastMedIntake(med.id);
                    const totalIntakes = countMedIntakes(med.id);
                    const perIntake = parseInt(med.pillsPerIntake) || 1;
                    const usagePoints = getSporadicUsagePoints(med);
                    let usageChartHtml = '';
                    if (usagePoints.length >= 1) {
                        const chartId = safeChartId('sporadicMedUseChart', med.id);
                        registerMedChart({
                            id: chartId,
                            type: 'sporadicUse',
                            labels: usagePoints.map(p => p.label),
                            counts: usagePoints.map(p => p.count),
                            name: med.name
                        });
                        usageChartHtml = `<div class="med-mini-chart"><div class="mini-chart-title">🔵 Gebruiksmomenten</div><canvas id="${chartId}" height="95"></canvas></div>`;
                    } else {
                        usageChartHtml = `<div class="med-mini-chart empty">📊 Nog geen gebruiksgrafiek beschikbaar</div>`;
                    }
                    return `
                        <div class="med-report-card sporadic">
                            <div class="med-card-top">
                                <div>
                                    <div class="med-type-badge sporadic">🔵 SPORADISCH</div>
                                    <h3>${med.icon || '💊'} ${med.name}</h3>
                                    <p class="med-dose">${med.dosage || ''}</p>
                                </div>
                                <div class="med-status">${getMedStatus(med)}</div>
                            </div>
                            <div class="sporadic-summary-grid">
                                <div><span>Standaard</span><strong>${perIntake} ${perIntake === 1 ? 'pil' : 'pillen'} / inname</strong></div>
                                <div><span>Aantal innames</span><strong>${totalIntakes}</strong></div>
                                <div><span>Laatste gebruik</span><strong>${last.date ? `${formatShortReportDate(last.date)} ${last.time || ''}` : 'Niet geregistreerd'}</strong></div>
                            </div>
                            ${usageChartHtml}
                        </div>`;
                };

                const dailyCardsHtml = dailyMedsForReport.length
                    ? dailyMedsForReport.map(renderDailyMedCard).join('')
                    : '<div class="empty-med-message">Geen dagelijkse medicatie geregistreerd.</div>';
                const sporadicCardsHtml = sporadicMedsForReport.length
                    ? sporadicMedsForReport.map(renderSporadicMedCard).join('')
                    : '<div class="empty-med-message">Geen sporadische medicatie geregistreerd.</div>';
                const totalSporadicIntakes = sporadicMedsForReport.reduce((sum, med) => sum + countMedIntakes(med.id), 0);
                const medDashboardHtml = `
        <div class="section med-report-section">
            <div class="section-title">💊 Actieve medicatie - medisch overzicht + grafieken</div>
            <div class="med-report-intro">
                <div><strong>${dailyMedsForReport.length}</strong><span>dagelijkse medicatie</span></div>
                <div><strong>${sporadicMedsForReport.length}</strong><span>sporadische medicatie</span></div>
                <div><strong>${takenDailyIntakes}</strong><span>dagelijkse innames</span></div>
                <div><strong>${totalSporadicIntakes}</strong><span>sporadische innames</span></div>
            </div>
            <div class="med-subtitle">🟢 Dagelijkse medicatie</div>
            <div class="med-report-grid">${dailyCardsHtml}</div>
            <div class="med-subtitle">🔵 Sporadische medicatie</div>
            <div class="med-report-grid">${sporadicCardsHtml}</div>
        </div>`;

                const html = `

                    ['ochtend', 'middag', 'avond'].forEach(moment => {

                            daySys.push(day[moment].sys);
                            dayDia.push(day[moment].dia);
                            dayHr.push(day[moment].hr);
                            totalSys += day[moment].sys;
                            totalDia += day[moment].dia;
                            totalHr += day[moment].hr;
                            count++;
                            const [y, m, d] = date.split('-');
                            const momentLabels = {ochtend: '🌅 Ochtend', middag: '☀️ Middag', avond: '🌙 Avond'};
                            measurementsHtml += `<tr><td>${d}/${m}</td><td>${momentLabels[moment]}</td><td>${day[moment].sys}/${day[moment].dia}</td><td>${day[moment].hr}</td></tr>`;
                        }
                    });
                    if (daySys.length > 0) {
                        dailyData[date] = {
                            sys: Math.round(daySys.reduce((a,b)=>a+b)/daySys.length),
                            dia: Math.round(dayDia.reduce((a,b)=>a+b)/dayDia.length),
                            hr: Math.round(dayHr.reduce((a,b)=>a+b)/dayHr.length)
                        };
                    }
                }

                const avgSys = count > 0 ? Math.round(totalSys / count) : 0;
                const avgDia = count > 0 ? Math.round(totalDia / count) : 0;
                const avgHr = count > 0 ? Math.round(totalHr / count) : 0;

            analyzeReportData() {
                let sysValues = [], diaValues = [], hrValues = [];
                for (let date in this.data.measures) {
                    const day = this.data.measures[date];
                    ['ochtend', 'middag', 'avond'].forEach(moment => {

                            hrValues.push(day[moment].hr);

                const calcStats = (values) => {
                    const min = Math.min(...values);
                    const max = Math.max(...values);
                    const avg = Math.round(values.reduce((a,b)=>a+b)/values.length);
                    const variation = max - min;
                    return { min, max, avg, variation };
                };
                
                const sys = calcStats(sysValues);
                const dia = calcStats(diaValues);
                const hr = calcStats(hrValues);
                
                const getStatus = (avg, type) => {
                    if (type === 'sys') return avg < 120 ? { status: '🟢 GOED', color: 'success' } : avg < 140 ? { status: '🟡 MATIG', color: 'warning' } : { status: '🔴 SLECHT', color: 'danger' };
                    if (type === 'dia') return avg < 80 ? { status: '🟢 GOED', color: 'success' } : avg < 90 ? { status: '🟡 MATIG', color: 'warning' } : { status: '🔴 SLECHT', color: 'danger' };
                    if (type === 'hr') return (avg >= 60 && avg <= 100) ? { status: '🟢 GOED', color: 'success' } : ((avg >= 50 && avg < 60) || (avg > 100 && avg <= 110)) ? { status: '🟡 MATIG', color: 'warning' } : { status: '🔴 SLECHT', color: 'danger' };
                };
                
                const getTrendStatus = (variation, type) => {
                    if (type === 'sys') return variation > 15 ? '🔴 INSTABIEL' : variation > 8 ? '🟡 MATIG' : '🟢 STABIEL';
                    if (type === 'dia') return variation > 10 ? '🔴 INSTABIEL' : variation > 5 ? '🟡 MATIG' : '🟢 STABIEL';
                    if (type === 'hr') return variation > 20 ? '🔴 INSTABIEL' : variation > 10 ? '🟡 MATIG' : '🟢 STABIEL';
                };
                
                return {
                    sys: { ...sys, ...getStatus(sys.avg, 'sys'), trendStatus: getTrendStatus(sys.variation, 'sys') },
                    dia: { ...dia, ...getStatus(dia.avg, 'dia'), trendStatus: getTrendStatus(dia.variation, 'dia') },
                    hr: { ...hr, ...getStatus(hr.avg, 'hr'), trendStatus: getTrendStatus(hr.variation, 'hr') },
                    measurementCount: sysValues.length
                };
            }

            getEasterDate(year) {
                const a = year % 19;
                const b = Math.floor(year / 100);
                const c = year % 100;
                const d = Math.floor(b / 4);
                const e = b % 4;
                const f = Math.floor((b + 8) / 25);
                const g = Math.floor((b - f + 1) / 3);
                const h = (19 * a + b - d - g + 15) % 30;
                const i = Math.floor(c / 4);
                const k = c % 4;
                const l = (32 + 2 * e + 2 * i - h - k) % 7;
                const m = Math.floor((a + 11 * h + 22 * l) / 451);
                const month = Math.floor((h + l - 7 * m + 114) / 31) - 1;
                const day = ((h + l - 7 * m + 114) % 31) + 1;
                return new Date(year, month, day);
            }

            formatLocalDate(d) {
                return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
            }

            getBelgianHoliday(dateStr) {
                const year = parseInt(dateStr.slice(0, 4));
                const holidays = {
                    [`${year}-01-01`]: 'Nieuwjaar',
                    [`${year}-05-01`]: 'Dag vd Arbeid',
                    [`${year}-07-21`]: 'Nationale feestdag',
                    [`${year}-08-15`]: 'O.L.V. Hemelvaart',
                    [`${year}-11-01`]: 'Allerheiligen',
                    [`${year}-11-11`]: 'Wapenstilstand',
                    [`${year}-12-25`]: 'Kerstmis'
                };
                const easter = this.getEasterDate(year);
                const addDays = (base, days) => {
                    const d = new Date(base);
                    d.setDate(d.getDate() + days);
                    return this.formatLocalDate(d);
                };
                holidays[addDays(easter, 1)] = 'Paasmaandag';
                holidays[addDays(easter, 39)] = 'O.H. Hemelvaart';
                holidays[addDays(easter, 50)] = 'Pinkstermaandag';
                return holidays[dateStr] || '';
            }

            buildCalendarHtml() {
                const y = this.month.getFullYear();
                const m = this.month.getMonth();
                const months = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
                const days = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
                const firstDay = (new Date(y, m, 1).getDay() + 6) % 7;
                const lastDay = new Date(y, m + 1, 0).getDate();
                const today = this.today();
                let cal = '';

                for (let i = 0; i < firstDay; i++) cal += '<div></div>';
                for (let d = 1; d <= lastDay; d++) {
                    const dateStr = y + '-' + String(m + 1).padStart(2, '0') + '-' + String(d).padStart(2, '0');
                    const dayOfWeek = new Date(y, m, d).getDay();
                    const holiday = this.getBelgianHoliday(dateStr);
                    let cls = 'day-cell';
                    if (dayOfWeek === 0 || dayOfWeek === 6) cls += ' weekend';
                    if (holiday) cls += ' holiday';
                    if (dateStr === today) cls += ' today';
                    const holidayHtml = holiday ? '<div class="holiday-name">' + holiday + '</div>' : '';
                    cal += '<div class="' + cls + '" title="' + (holiday || dateStr) + '" onclick="app.date=\'' + dateStr + '\';app.view=\'day\';app.show();"><div class="day-number">' + d + '</div>' + holidayHtml + '</div>';
                }

                let html = '<div class="calendar-wrap">';
                html += '<div class="calendar-head">';
                html += '<button class="calendar-nav-btn" onclick="app.month.setMonth(app.month.getMonth()-1);app.show();">◀</button>';
                html += '<div class="calendar-title">📅 ' + months[m] + ' ' + y + '</div>';
                html += '<button class="calendar-nav-btn" onclick="app.month.setMonth(app.month.getMonth()+1);app.show();">▶</button>';
                html += '</div>';
                html += '<div class="calendar-weekdays">';
                for (let d of days) html += '<div class="calendar-weekday">' + d + '</div>';
                html += '</div>';
                html += '<div class="calendar-grid">' + cal + '</div>';
                html += '</div>';
                return html;
            }


            getFollowUpStats() {
                const measures = this.data.measures || {};
                const entries = [];
                Object.keys(measures).forEach(date => {
                    const day = measures[date] || {};
                    ['ochtend', 'middag', 'avond'].forEach(moment => {
                        const m = day[moment];
                        if (!m || !m.sys || !m.dia || !m.hr) return;
                        entries.push({
                            date: date,
                            moment: moment,
                            time: m.time || '',
                            sys: parseInt(m.sys),
                            dia: parseInt(m.dia),
                            hr: parseInt(m.hr),
                            order: date + ' ' + (m.time || (moment === 'ochtend' ? '08:00' : moment === 'middag' ? '13:00' : '20:00'))
                        });
                    });
                });

                entries.sort((a, b) => a.order.localeCompare(b.order));
                const first = entries.length ? entries[0] : null;
                const last = entries.length ? entries[entries.length - 1] : null;
                let days = 0;
                if (first) {
                    const start = new Date(first.date + 'T00:00:00');
                    const now = new Date();
                    days = Math.max(1, Math.floor((now - start) / 86400000) + 1);
                }
                return { first, last, days, total: entries.length };
            }

            formatFollowUpDate(dateStr) {
                if (!dateStr) return 'Nog geen meting';
                try {
                    const parts = String(dateStr).split('-');
                    if (parts.length === 3) return parts[2] + '-' + parts[1] + '-' + parts[0];
                    return dateStr;
                } catch(e) { return dateStr; }
            }

        function formatDate(dateStr) {

        function compressImage(base64, callback) {
            if (!base64) {
                callback(null);
                return;
            }
            
            const img = new Image();
            img.onload = function() {
                const canvas = document.createElement('canvas');
                const maxSize = 150;
                let width = img.width;
                let height = img.height;
                
                if (width > height) {
                    if (width > maxSize) {
                        height = Math.round(height * maxSize / width);
                        width = maxSize;
                    }
                } else {
                    if (height > maxSize) {
                        width = Math.round(width * maxSize / height);
                        height = maxSize;
                    }
                }
                
                canvas.width = width;
                canvas.height = height;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);
                
                const compressed = canvas.toDataURL('image/jpeg', 0.6);
                callback(compressed);
            };
            img.src = base64;
        }

                            <textarea id="patient-mobility-status" placeholder="bijv. Krukken/Rolstoel, Loopt met hulpmiddel..." style="width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:6px;box-sizing:border-box;font-size:14px;font-family:inherit;min-height:60px;resize:vertical;">${p.mobilityStatus || ''}</textarea>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:24px;">
                            <button style="background:#f3f4f6;color:#374151;border:1px solid #e5e7eb;padding:11px 16px;border-radius:6px;font-weight:500;cursor:pointer;font-size:14px;" onclick="document.getElementById('patient-modal').remove();">Annuleren</button>
                            <button style="background:#3b82f6;color:white;border:none;padding:11px 16px;border-radius:6px;font-weight:500;cursor:pointer;font-size:14px;" onclick="savePatientData();">Opslaan</button>
                        </div>
                    </div>
                </div>
            `);
            
            const fileInput = document.getElementById('patient-photo');
            const uploadArea = document.getElementById('upload-area');
            const previewContainer = document.getElementById('preview-container');
            const photoPreview = document.getElementById('photo-preview');
            const changePhotoBtn = document.getElementById('change-photo-btn');
            const removePhotoBtn = document.getElementById('remove-photo-btn');
            
            // Upload area klikken
            uploadArea.addEventListener('click', () => fileInput.click());
            
            // Change photo button
            changePhotoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.click();
            });
            
            // Remove photo button
            removePhotoBtn.addEventListener('click', (e) => {
                e.preventDefault();
                fileInput.value = '';
                photoPreview.src = '';
                previewContainer.style.display = 'none';
                uploadArea.style.display = 'block';
            });
            
            // File change
            fileInput.addEventListener('change', (e) => {
                if (e.target.files[0]) {
                    const reader = new FileReader();
                    reader.onload = (ev) => {
                        photoPreview.src = ev.target.result;
                        previewContainer.style.display = 'block';
                        uploadArea.style.display = 'none';
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            });
        }
        
        function savePatientData() {
            const firstName = document.getElementById('patient-first').value;
            const lastName = document.getElementById('patient-last').value;
            const birthDate = document.getElementById('patient-birth').value;
            const allergies = document.getElementById('patient-allergies').value;
            const medicalHistory = document.getElementById('patient-medical-history').value;
            const mobilityStatus = document.getElementById('patient-mobility-status').value;
            const language = document.getElementById('patient-language')?.value || 'nl';
            const preview = document.getElementById('photo-preview');
            
            // Check of foto geldig is (data URL en zichtbaar)
            const hasValidPhoto = preview && preview.src && preview.src.startsWith('data:') && preview.style.display !== 'none';
            const photoBase64 = hasValidPhoto ? preview.src : null;
            
            if (!firstName || !lastName || !birthDate) {
                alert('Vul voornaam, achternaam en geboortedatum in!');
                return;
            }
            
            try {
                if (photoBase64) {
                    compressImage(photoBase64, (compressed) => {
                        if (app && app.savePatient) {
                            app.savePatient(firstName, lastName, birthDate, compressed, allergies, medicalHistory, mobilityStatus, language);
                            const modal = document.getElementById('patient-modal');
                            if (modal) modal.remove();
                        }
                    });
                } else {
                    if (app && app.savePatient) {
                        app.savePatient(firstName, lastName, birthDate, null, allergies, medicalHistory, mobilityStatus, language);
                        const modal = document.getElementById('patient-modal');
                        if (modal) modal.remove();
                    }
                }
            } catch(e) {
                console.error('Error saving patient:', e);
                alert('Fout bij opslaan: ' + e.message);
            }
        }
        
        const app = new App();
        app.show();
        
        // Initialize Google Drive
        (async () => {
          try {
            setTimeout(initGoogleDrive, 1500);
          } catch(err) {
            console.error('Google init error:', err);
          }
        })();

        // Register Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/HealthApp/sw.js').catch(() => {});
            
            // Listen for periodic sync messages from Service Worker
            navigator.serviceWorker.addEventListener('message', (event) => {
              if (event.data.type === 'PERFORM_SYNC') {
                console.log('Auto-sync triggered:', event.data.tag);
                if (isGTokenValid() && typeof driveSync === 'function') {
                  driveSync();
                }
              }
            });
            
            // Register Periodic Background Sync
            if ('serviceWorker' in navigator && 'BackgroundSyncManager' in window) {
              navigator.serviceWorker.ready.then(registration => {
                // Register sync tags for specific times
                const syncTags = ['sync-07', 'sync-09', 'sync-12', 'sync-21'];
                syncTags.forEach(tag => {
                  registration.periodicSync.register(tag, {
                    minInterval: 24 * 60 * 60 * 1000 // Once per day
                  }).catch(() => {});
                });
              });
            }
        }
    </script>
</body>
</html>
