<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Health Tracker PRO</title>
    <link rel="manifest" href="/HealthApp/manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-user-select: none; }
        input, button { -webkit-user-select: text !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .day-cell { aspect-ratio: 1; border-radius: 8px; padding: 4px; font-size: 10px; cursor: pointer; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 48px; background: #fff; border: 2px solid #e5e7eb; font-weight: 600; }
        .day-cell.weekend { background-color: #f9fafb; }
        .day-cell.holiday { background: linear-gradient(135deg, #fef08a 0%, #fde047 100%); }
        .day-cell.today { background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%); color: #333; border-color: #d97706; }
        .pill-grid { display: grid; gap: 3px; }
        .input-field { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; }
        .med-section { background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); border-left: 4px solid; }
        .blood-section { background: white; border-radius: 12px; padding: 14px; margin-bottom: 10px; border-left: 4px solid #8b5cf6; box-shadow: 0 1px 4px rgba(0,0,0,0.03); }
        .input-group { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>

    <script>
        function generateHolidays() {
            const holidays = {};
            for (let year = 2024; year <= 2060; year++) {
                holidays[year] = {
                    '01-01': 'Nieuwjaarsdag', '05-01': 'Dag van de Arbeid', '07-21': 'Belgische Nationale Feestdag',
                    '08-15': 'Onze-Lieve-Vrouw', '11-01': 'Allerheiligen', '11-11': 'Wapenstilstand', '12-25': 'Kerstmis'
                };
                const easter = computeEaster(year);
                const easterDate = `${String(easter.month).padStart(2, '0')}-${String(easter.date).padStart(2, '0')}`;
                holidays[year][easterDate] = 'Pasen';
                const ascension = new Date(year, easter.month - 1, easter.date + 39);
                const ascensionDate = `${String(ascension.getMonth() + 1).padStart(2, '0')}-${String(ascension.getDate()).padStart(2, '0')}`;
                holidays[year][ascensionDate] = 'Hemelvaartsdag';
            }
            return holidays;
        }

        function computeEaster(year) {
            const a = year % 19, b = Math.floor(year / 100), c = year % 100, d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3);
            const h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451);
            const month = Math.floor((h + l - 7 * m + 114) / 31), date = ((h + l - 7 * m + 114) % 31) + 1;
            return { month, date };
        }

        const HOLIDAYS = generateHolidays();
        const MED_COLORS = ['#ff0000', '#0066ff', '#00cc00', '#ff6600', '#ff00ff', '#00cccc', '#ffaa00', '#ff0099', '#0099ff', '#ff3333'];
        const MED_ICONS = ['💊', '💉', '🩺', '🏥', '🔬', '⚕️', '🩹', '🧪', '⚕️', '🩊'];

        class HealthTracker {
            constructor() {
                this.data = this.loadData('healthTrackerData') || this.initializeData();
                this.telegramSettings = this.loadData('telegramSettings') || { token: '', chatId: '' };
                this.currentMonth = new Date();
                this.selectedDate = null;
                this.view = 'calendar';
                this.showMedicationSettings = false;
                
                this.checkDaily();
                this.render();
            }

            initializeData() {
                return {
                    medications: [
                        { id: 'med_belsar', name: 'Belsar', dosage: '20mg', totalPills: 49, color: MED_COLORS[0], icon: MED_ICONS[0], resetDate: this.getTodayDate() }
                    ],
                    medicationIntakes: {},
                    measurements: {}
                };
            }

            loadData(key) { return JSON.parse(localStorage.getItem(key)); }
            saveData(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
            getTodayDate() { const d = new Date(); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`; }

            checkDaily() {
                const today = this.getTodayDate();
                const lastCheck = this.loadData('lastDailyCheck');
                
                if (lastCheck !== today) {
                    const now = new Date();
                    const checkTime = new Date();
                    checkTime.setHours(10, 0, 0, 0);
                    
                    const timeUntilCheck = checkTime.getTime() - now.getTime();
                    
                    if (timeUntilCheck > 0) {
                        setTimeout(() => this.sendDailyReminder(), timeUntilCheck);
                    } else {
                        this.sendDailyReminder();
                    }
                    
                    this.saveData('lastDailyCheck', today);
                }
            }

            sendDailyReminder() {
                const today = this.getTodayDate();
                const todayIntakes = this.data.medicationIntakes[today] || {};
                
                let message = '⏰ <b>10:00 MEDICATIE CHECK</b>\n\n';
                let hasForgotten = false;
                
                this.data.medications.forEach(med => {
                    const isTaken = todayIntakes[med.id];
                    if (isTaken) {
                        message += `✅ ${med.icon} ${med.name}: ${isTaken}\n`;
                    } else {
                        message += `❌ ${med.icon} ${med.name}: <b>VERGETEN!</b>\n`;
                        hasForgotten = true;
                    }
                });
                
                if (hasForgotten) {
                    message += `\n🚨 <b>ACTION!</b>`;
                } else {
                    message += `\n✅ <b>Alles OK!</b>`;
                }
                
                this.sendTelegramMessage(message);
            }

            async sendTelegramMessage(message) {
                if (!this.telegramSettings.token || !this.telegramSettings.chatId) return false;
                try {
                    const response = await fetch(`https://api.telegram.org/bot${this.telegramSettings.token}/sendMessage`, {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: this.telegramSettings.chatId, text: message, parse_mode: 'HTML' })
                    });
                    return (await response.json()).ok;
                } catch (e) { console.error('Telegram error:', e); return false; }
            }

            openTelegramSettings() {
                const token = prompt('🔑 Bot Token:', this.telegramSettings.token || '');
                if (token === null) return;
                const chatId = prompt('💬 Chat ID:', this.telegramSettings.chatId || '');
                if (chatId === null) return;
                if (!token || !chatId) { alert('❌ Beide velden nodig!'); return; }
                this.telegramSettings = { token, chatId };
                this.saveData('telegramSettings', this.telegramSettings);
                alert('✅ Telegram opgeslagen!');
                this.sendTelegramMessage('✅ Health Tracker werkt!');
            }

            openSettings() {
                this.showMedicationSettings = !this.showMedicationSettings;
                this.render();
            }

            addMedication() {
                if (this.data.medications.length >= 10) { alert('❌ Max 10 medicaties!'); return; }
                const name = prompt('Medicatie naam:');
                if (!name) return;
                const dosage = prompt('Dosage:');
                if (!dosage) return;
                const pills = prompt('Aantal pillen (max 70):');
                if (!pills || isNaN(pills)) return;
                const amount = parseInt(pills);
                if (amount > 70) { alert('⚠️ Max 70 pillen (14 dagen x 5)!'); return; }
                if (amount < 1) { alert('❌ Min 1 pil!'); return; }
                
                const med = {
                    id: `med_${Date.now()}`,
                    name, dosage,
                    totalPills: amount,
                    color: MED_COLORS[this.data.medications.length % MED_COLORS.length],
                    icon: MED_ICONS[this.data.medications.length % MED_ICONS.length],
                    resetDate: this.getTodayDate()
                };
                this.data.medications.push(med);
                this.saveData('healthTrackerData', this.data);
                
                this.sendTelegramMessage(
                    `${med.icon} <b>${med.name.toUpperCase()} TOEGEVOEGD!</b>\n` +
                    `├─ ${med.dosage}\n` +
                    `├─ ${med.totalPills} pillen\n` +
                    `└─ ✅ Klaar!`
                );
                alert(`✅ ${name} toegevoegd!`);
                this.render();
            }

            removeMedication(medId) {
                if (this.data.medications.length === 1) { alert('❌ Moet minstens 1 medicatie hebben!'); return; }
                const med = this.data.medications.find(m => m.id === medId);
                if (confirm(`Verwijderen: ${med.name}?`)) {
                    this.data.medications = this.data.medications.filter(m => m.id !== medId);
                    this.data.medicationIntakes = Object.fromEntries(
                        Object.entries(this.data.medicationIntakes).map(([date, meds]) => [date, Object.fromEntries(Object.entries(meds).filter(([mid]) => mid !== medId))])
                    );
                    this.saveData('healthTrackerData', this.data);
                    this.sendTelegramMessage(`🗑️ <b>${med.icon} ${med.name.toUpperCase()} VERWIJDERD</b>`);
                    alert(`✅ ${med.name} verwijderd!`);
                    this.render();
                }
            }

            resetMedication(medId) {
                const med = this.data.medications.find(m => m.id === medId);
                const amt = prompt(`${med.icon} ${med.name}: Hoeveel pillen nu?\n(max 70, huiedig: ${med.totalPills})`);
                if (amt === null) return;
                const amount = parseInt(amt);
                if (amount > 70) { alert('⚠️ Max 70 pillen!'); return; }
                if (isNaN(amount) || amount < 0) { alert('❌ Geldig getal!'); return; }
                
                const oldAmount = med.totalPills;
                med.totalPills = amount;
                med.resetDate = this.getTodayDate();
                
                this.data.medicationIntakes = Object.fromEntries(
                    Object.entries(this.data.medicationIntakes).map(([date, meds]) => {
                        const newMeds = { ...meds };
                        delete newMeds[medId];
                        return [date, newMeds];
                    })
                );
                
                const toConsume = med.totalPills - amount;
                for (let i = 0; i < toConsume; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - toConsume + i);
                    const dateStr = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    if (!this.data.medicationIntakes[dateStr]) this.data.medicationIntakes[dateStr] = {};
                    this.data.medicationIntakes[dateStr][medId] = '12:00';
                }
                
                this.saveData('healthTrackerData', this.data);
                
                this.sendTelegramMessage(
                    `🔄 <b>${med.icon} ${med.name.toUpperCase()} RESET</b>\n` +
                    `├─ ${oldAmount} → ${amount} pillen\n` +
                    `├─ 📊 ${amount}/${amount}\n` +
                    `└─ 📅 Reset: ${this.getTodayDate()}`
                );
                
                alert(`✅ ${med.name} reset naar ${amount} pillen!`);
                this.render();
            }

            getPillsRemaining(medId) {
                const med = this.data.medications.find(m => m.id === medId);
                const intakes = Object.values(this.data.medicationIntakes || {}).reduce((sum, dayMeds) => {
                    return sum + (dayMeds[medId] ? 1 : 0);
                }, 0);
                return med.totalPills - intakes;
            }

            goToToday() { this.currentMonth = new Date(); this.render(); }
            jumpToMonthYear() {
                const action = prompt('📅 JUMP:\n1=Maand\n2=Jaar\n3=Beiden');
                if (!action) return;
                if (action === '1' || action === '3') {
                    const m = prompt('Maand (1-12):', String(this.currentMonth.getMonth() + 1));
                    if (m && parseInt(m) >= 1 && parseInt(m) <= 12) this.currentMonth.setMonth(parseInt(m) - 1);
                }
                if (action === '2' || action === '3') {
                    const y = prompt('Jaar (2024-2060):', String(this.currentMonth.getFullYear()));
                    if (y && parseInt(y) >= 2024 && parseInt(y) <= 2060) this.currentMonth.setFullYear(parseInt(y));
                }
                this.render();
            }

            isHoliday(dateStr) { const [y, m, dd] = dateStr.split('-'); return HOLIDAYS[y]?.[`${m}-${dd}`]; }
            isWeekend(dateStr) { return new Date(dateStr).getDay() === 0 || new Date(dateStr).getDay() === 6; }
            selectDate(dateStr) { this.selectedDate = dateStr; this.view = 'day'; this.render(); }
            goBackToCalendar() { this.view = 'calendar'; this.render(); }

            recordMedicationIntake(medId, time) {
                const med = this.data.medications.find(m => m.id === medId);
                if (!this.data.medicationIntakes) this.data.medicationIntakes = {};
                if (!this.data.medicationIntakes[this.selectedDate]) this.data.medicationIntakes[this.selectedDate] = {};
                
                if (time) {
                    this.data.medicationIntakes[this.selectedDate][medId] = time;
                    
                    this.sendTelegramMessage(
                        `✅ <b>${med.icon} ${med.name.toUpperCase()} INGENOMEN!</b>\n` +
                        `├─ ⏰ ${time}\n` +
                        `├─ 📊 ${this.getPillsRemaining(medId)}/${med.totalPills}\n` +
                        `└─ ✅ Goed!`
                    );
                    
                    if (this.getPillsRemaining(medId) < 5) {
                        this.sendTelegramMessage(
                            `⚠️ <b>${med.icon} ${med.name.toUpperCase()} - WAARSCHUWING!</b>\n` +
                            `├─ Nog <b>${this.getPillsRemaining(medId)} pillen</b>\n` +
                            `└─ 🚨 BESTELLEN! 💊`
                        );
                    }
                } else {
                    delete this.data.medicationIntakes[this.selectedDate][medId];
                }
                this.saveData('healthTrackerData', this.data);
                this.render();
            }

            saveMeasurement(moment, sys, dia, hr) {
                if (!this.data.measurements) this.data.measurements = {};
                if (!this.data.measurements[this.selectedDate]) this.data.measurements[this.selectedDate] = {};
                if (sys && dia && hr) {
                    this.data.measurements[this.selectedDate][moment] = { sys: parseInt(sys), dia: parseInt(dia), hartslag: parseInt(hr) };
                } else {
                    delete this.data.measurements[this.selectedDate][moment];
                }
                this.saveData('healthTrackerData', this.data);
            }

            getColorStatus(sys, dia) {
                if (!sys || !dia) return 'empty';
                const s = parseInt(sys), d = parseInt(dia);
                if (isNaN(s) || isNaN(d)) return 'empty';
                if (s < 130 && d < 85) return 'green';
                if ((s >= 130 && s < 160) || (d >= 85 && d < 100)) return 'orange';
                return 'red';
            }

            updateStatusBadge(moment) {
                const sys = document.querySelector(`.sys-${moment}`)?.value || '';
                const dia = document.querySelector(`.dia-${moment}`)?.value || '';
                const hr = document.querySelector(`.hartslag-${moment}`)?.value || '';
                const status = this.getColorStatus(sys, dia);
                const badge = document.getElementById(`status-${moment}`);
                if (badge) {
                    badge.className = `status-badge ${status}`;
                    const color = status === 'green' ? '#10b981' : status === 'orange' ? '#f59e0b' : '#ef4444';
                    badge.innerHTML = status === 'empty' ? '❌' : `<span style="width: 8px; height: 8px; border-radius: 50%; background: ${color}; margin-right: 6px;"></span>${sys}/${dia}`;
                }
                if (sys && dia && hr) this.saveMeasurement(moment, sys, dia, hr);
            }

            render() {
                document.getElementById('app').innerHTML = this.view === 'calendar' ? this.renderCalendar() : this.renderDayView();
                this.attachListeners();
            }

            renderCalendar() {
                const year = this.currentMonth.getFullYear();
                const month = this.currentMonth.getMonth();
                const monthNames = ['januari', 'februari', 'maart', 'april', 'mei', 'juni', 'juli', 'augustus', 'september', 'oktober', 'november', 'december'];
                const dayNames = ['Ma', 'Di', 'Wo', 'Do', 'Vr', 'Za', 'Zo'];
                const firstDay = new Date(year, month, 1);
                const daysInMonth = new Date(year, month + 1, 0).getDate();
                let startDayOfWeek = (firstDay.getDay() + 6) % 7;
                const today = this.getTodayDate();
                let calendarDays = '';

                for (let i = 0; i < startDayOfWeek; i++) calendarDays += '<div></div>';
                for (let day = 1; day <= daysInMonth; day++) {
                    const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                    const isToday = dateStr === today;
                    const isWknd = this.isWeekend(dateStr);
                    const hol = this.isHoliday(dateStr);
                    let cls = 'day-cell';
                    if (isToday) cls += ' today';
                    if (isWknd && !isToday) cls += ' weekend';
                    if (hol) cls += ' holiday';
                    calendarDays += `<div class="${cls}" data-date="${dateStr}"><div style="font-size: 16px; font-weight: 700;">${day}</div>${hol ? `<div style="font-size: 8px; margin-top: 2px;">${hol.substring(0, 3)}</div>` : ''}</div>`;
                }

                return `<div style="min-height: 100vh; background: #f9fafb; padding: 12px;">
                    <div style="background: linear-gradient(135deg, #dc2626 0%, #991b1b 100%); color: white; border-radius: 16px; padding: 12px; margin-bottom: 16px; display: flex; align-items: center; gap: 12px; justify-content: space-between;">
                        <div style="display: flex; align-items: center; gap: 12px; flex: 1;">
                            <img src="./logo.png" alt="Logo" style="width: 48px; height: 48px; border-radius: 12px; background: white; padding: 4px;" onerror="this.innerHTML='❤️'; this.style.fontSize='36px'; this.style.padding='0';">
                            <div style="flex: 1;">
                                <h1 style="font-size: 14px; font-weight: 700; margin: 0;">Bloeddruk/Medicatie</h1>
                                <p style="font-size: 10px; opacity: 0.9; margin: 2px 0 0 0;">Opvolgingstool (${this.data.medications.length} meds)</p>
                                <p style="font-size: 9px; opacity: 0.8; margin: 2px 0 0 0;">Made by Philippe De Meersman</p>
                            </div>
                        </div>
                        <div style="display: flex; gap: 6px;">
                            <button onclick="app.openTelegramSettings()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">💬</button>
                            <button onclick="app.openSettings()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">⚙️</button>
                            <button onclick="app.goToToday()" style="background: rgba(255,255,255,0.2); border: none; color: white; font-size: 18px; cursor: pointer; padding: 8px 12px; border-radius: 8px;">📅</button>
                        </div>
                    </div>

                    ${this.showMedicationSettings ? `
                        <div style="background: white; border-radius: 12px; padding: 12px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);">
                            <h2 style="font-size: 14px; font-weight: 700; margin-bottom: 10px;">💊 MEDICATIES</h2>
                            ${this.data.medications.map(med => `
                                <div style="background: #f9fafb; border-radius: 8px; padding: 10px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                                    <div>
                                        <div style="font-weight: 700;">${med.icon} ${med.name}</div>
                                        <div style="font-size: 11px; color: #6b7280;">${med.dosage} • ${this.getPillsRemaining(med.id)}/${med.totalPills} pillen</div>
                                    </div>
                                    <div style="display: flex; gap: 6px;">
                                        <button onclick="app.resetMedication('${med.id}')" style="background: #3b82f6; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;">Reset</button>
                                        <button onclick="app.removeMedication('${med.id}')" style="background: #ef4444; color: white; border: none; border-radius: 6px; padding: 6px 10px; font-size: 12px; cursor: pointer;">✕</button>
                                    </div>
                                </div>
                            `).join('')}
                            <button onclick="app.addMedication()" style="background: #10b981; color: white; border: none; border-radius: 8px; padding: 8px 12px; width: 100%; font-weight: 700; cursor: pointer; margin-top: 8px;">+ Medicatie toevoegen</button>
                        </div>
                    ` : ''}

                    ${this.data.medications.map(med => `
                        <div style="background: white; border-radius: 12px; padding: 8px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.03);">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px;">
                                <h2 style="font-size: 12px; font-weight: 700; margin: 0; color: ${med.color};">${med.icon} ${med.name}</h2>
                                <div style="font-size: 11px; font-weight: 600; color: ${this.getPillsRemaining(med.id) > (med.totalPills / 10) ? '#10b981' : this.getPillsRemaining(med.id) >= 5 ? '#f59e0b' : '#ef4444'};">
                                    ${this.getPillsRemaining(med.id) > (med.totalPills / 10) ? '✅' : this.getPillsRemaining(med.id) >= 5 ? '⚠️' : '🚨'} ${this.getPillsRemaining(med.id)}/${med.totalPills}
                                </div>
                            </div>
                            <div class="pill-grid" style="background: ${med.color}33; border-radius: 8px; padding: 8px; grid-template-columns: repeat(${Math.min(10, med.totalPills)}, 1fr);">
                                ${[...Array(med.totalPills)].map((_, i) => `<div style="font-size: 16px; opacity: ${i >= this.getPillsRemaining(med.id) ? '0.3' : '1'}; filter: ${i >= this.getPillsRemaining(med.id) ? 'grayscale(100%)' : 'none'};">${med.icon}</div>`).join('')}
                            </div>
                        </div>
                    `).join('')}

                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; gap: 8px;">
                        <button class="prev-month" style="background: white; border: none; border-radius: 10px; width: 36px; height: 36px; font-size: 16px; cursor: pointer;">◀</button>
                        <div style="flex: 1; text-align: center; cursor: pointer;" onclick="app.jumpToMonthYear()">
                            <h2 style="font-size: 16px; font-weight: 700; text-transform: capitalize; margin: 0;">📅 ${monthNames[month]} ${year}</h2>
                        </div>
                        <button class="next-month" style="background: white; border: none; border-radius: 10px; width: 36px; height: 36px; font-size: 16px; cursor: pointer;">▶</button>
                    </div>
                    <div style="background: white; border-radius: 12px; padding: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.03); overflow-y: auto; max-height: 400px;">
                        <div style="display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; margin-bottom: 8px;">
                            ${dayNames.map(d => `<div style="text-align: center; font-weight: 600; color: #6b7280; font-size: 11px; padding: 6px 0;">${d}</div>`).join('')}
                        </div>
                        <div class="calendar-grid">${calendarDays}</div>
                    </div>
                </div>`;
            }

            renderDayView() {
                const [year, month, day] = this.selectedDate.split('-');
                const dateObj = new Date(this.selectedDate);
                const dayName = dateObj.toLocaleDateString('nl-NL', { weekday: 'short' });
                const monthName = ['jan', 'feb', 'mrt', 'apr', 'mei', 'jun', 'jul', 'aug', 'sep', 'okt', 'nov', 'dec'][month - 1];
                const hol = this.isHoliday(this.selectedDate);
                const dayMeds = this.data.medicationIntakes?.[this.selectedDate] || {};
                const measurements = this.data.measurements[this.selectedDate] || {};

                const renderMoment = (moment, icon, timeDisplay) => {
                    const data = measurements[moment];
                    const sys = data?.sys || '';
                    const dia = data?.dia || '';
                    const hr = data?.hartslag || '';
                    const status = this.getColorStatus(sys, dia);
                    return `<div class="blood-section">
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                            <div>
                                <div style="font-weight: 700; font-size: 14px;">${icon} ${moment.charAt(0).toUpperCase() + moment.slice(1)}</div>
                                <div style="font-size: 11px; color: #6b7280; margin-top: 2px;">${timeDisplay}</div>
                            </div>
                            <div class="status-badge ${status}" id="status-${moment}" style="background: ${status === 'green' ? '#d1fae5' : status === 'orange' ? '#fed7aa' : status === 'red' ? '#fecaca' : '#f3f4f6'};">
                                ${status === 'empty' ? '❌' : `<span style="width: 6px; height: 6px; border-radius: 50%; background: ${status === 'green' ? '#10b981' : status === 'orange' ? '#f59e0b' : '#ef4444'}; margin-right: 4px;"></span>${sys}/${dia}`}
                            </div>
                        </div>
                        <div class="input-group">
                            <input type="number" class="input-field sys-${moment}" placeholder="Sys" value="${sys}" oninput="app.updateStatusBadge('${moment}');">
                            <input type="number" class="input-field dia-${moment}" placeholder="Dia" value="${dia}" oninput="app.updateStatusBadge('${moment}');">
                            <input type="number" class="input-field hartslag-${moment}" placeholder="HR" value="${hr}" oninput="app.updateStatusBadge('${moment}');">
                        </div>
                    </div>`;
                };

                return `<div style="min-height: 100vh; background: #f9fafb; padding: 12px 12px 100px 12px;">
                    <div style="background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%); color: white; border-radius: 16px; padding: 12px; margin-bottom: 12px;">
                        <button class="back-btn" style="background: rgba(255,255,255,0.2); border: none; border-radius: 8px; width: 32px; height: 32px; color: white; font-size: 16px; cursor: pointer; margin-bottom: 8px;">◀</button>
                        <h1 style="font-size: 18px; font-weight: 700; margin: 0;">${dayName} ${day} ${monthName}</h1>
                        ${hol ? `<p style="font-size: 12px; opacity: 0.95; margin: 4px 0 0 0;">🎉 ${hol}</p>` : ''}
                    </div>

                    ${this.data.medications.map(med => {
                        const medTime = dayMeds[med.id] || '';
                        return `<div class="med-section" style="border-left-color: ${med.color};">
                            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;">
                                <div>
                                    <h2 style="font-size: 14px; font-weight: 700; margin: 0; color: ${med.color};">${med.icon} ${med.name}</h2>
                                    <div style="font-size: 11px; color: #6b7280;">${med.dosage}</div>
                                </div>
                                <span style="background: ${med.color}; color: white; padding: 3px 8px; border-radius: 12px; font-weight: 600; font-size: 12px;">${this.getPillsRemaining(med.id)}/${med.totalPills}</span>
                            </div>
                            ${medTime ? `<div style="background: #d1fae5; border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 12px; color: #065f46; font-weight: 600;">✅ ${medTime}</div>` : `<div style="background: #fef3c7; border-radius: 8px; padding: 8px; margin-bottom: 8px; font-size: 12px; color: #92400e; font-weight: 600;">⏰ Niet ingevuld</div>`}
                            <div style="display: flex; gap: 6px;">
                                <input type="time" class="input-field med-time-${med.id}" style="flex: 1;" value="${medTime || ''}">
                                <button style="padding: 10px 12px; background: #10b981; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;" onclick="app.recordMedicationIntake('${med.id}', document.querySelector('.med-time-${med.id}').value);">💾</button>
                                <button style="padding: 10px 12px; background: ${med.color}; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;" onclick="app.recordMedicationIntake('${med.id}', '');">✕</button>
                            </div>
                        </div>`;
                    }).join('')}

                    <h3 style="font-size: 14px; font-weight: 700; margin-top: 20px; margin-bottom: 10px;">❤️ BLOEDWAARDEN</h3>
                    ${renderMoment('ochtend', '🌅', '8:00 AM')}
                    ${renderMoment('middag', '☀️', '13:00 (1 PM)')}
                    ${renderMoment('avond', '🌙', '20:00 (8 PM)')}
                </div>`;
            }

            attachListeners() {
                if (this.view === 'calendar') {
                    document.querySelectorAll('.day-cell').forEach(cell => {
                        cell.addEventListener('click', () => { if (cell.dataset.date) this.selectDate(cell.dataset.date); });
                    });
                    document.querySelector('.prev-month')?.addEventListener('click', () => { this.currentMonth.setMonth(this.currentMonth.getMonth() - 1); this.render(); });
                    document.querySelector('.next-month')?.addEventListener('click', () => { this.currentMonth.setMonth(this.currentMonth.getMonth() + 1); this.render(); });
                } else {
                    document.querySelector('.back-btn')?.addEventListener('click', () => { this.goBackToCalendar(); });
                }
            }
        }

        const app = new HealthTracker();
    </script>
</body>
</html>
