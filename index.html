<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>❤️ Health Tracker</title>
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="description" content="Bloeddruk & Medicatie Monitor">
    <link rel="manifest" href="/HealthApp/manifest.json">
    <link rel="icon" href="/HealthApp/logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/HealthApp/logo.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        * { -webkit-user-select: none; user-select: none; }
        input, button { -webkit-user-select: text !important; user-select: text !important; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .settings-btn { position: fixed; bottom: 20px; right: 20px; width: 50px; height: 50px; border-radius: 50%; background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); color: white; border: none; cursor: pointer; font-size: 20px; box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4); z-index: 999; }
        .settings-btn:hover { transform: scale(1.1); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 16px; padding: 20px; max-width: 500px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        .success-box { background: #d1fae5; border: 2px solid #6ee7b7; border-radius: 10px; padding: 12px; margin-bottom: 12px; color: #065f46; font-size: 13px; font-weight: 600; }
        .alert-box { background: #fef3c7; border: 2px solid #fcd34d; border-radius: 10px; padding: 12px; margin-bottom: 12px; color: #92400e; font-size: 13px; font-weight: 600; }
        .input-field { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 14px; background: #ffffff; }
        .input-field:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
    </style>
</head>
<body class="bg-gray-50">
    <div id="app"></div>
    <div id="settingsModal" class="modal">
        <div class="modal-content">
            <h2 style="font-size: 18px; font-weight: 700; margin-bottom: 16px;">⚙️ Instellingen</h2>
            <div style="margin-bottom: 20px;">
                <h3 style="font-size: 14px; font-weight: 700; margin-bottom: 8px;">💬 Telegram Setup</h3>
                <p style="font-size: 12px; color: #6b7280; margin-bottom: 12px;">Ontvang alerts voor medicatie & metingen</p>
                <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600;">Bot Token:</label>
                <input type="password" id="telegramToken" class="input-field" style="margin-bottom: 12px; font-size: 12px;" placeholder="Paste je Telegram Bot Token">
                <label style="display: block; margin-bottom: 8px; font-size: 12px; font-weight: 600;">Chat ID:</label>
                <input type="text" id="telegramChatId" class="input-field" style="margin-bottom: 12px; font-size: 12px;" placeholder="Jouw Chat ID">
                <button onclick="app.saveTelegramSettings()" style="width: 100%; padding: 10px; background: #8b5cf6; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-bottom: 8px;">💾 Opslaan</button>
                <button onclick="app.testTelegramAlert()" style="width: 100%; padding: 10px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer; margin-bottom: 12px;">🧪 Test Alert</button>
                <div id="telegramStatus"></div>
            </div>
            <hr style="margin: 20px 0; border: 1px solid #e5e7eb;">
            <button onclick="app.closeSettings()" style="width: 100%; padding: 10px; background: #6b7280; color: white; border: none; border-radius: 10px; font-weight: 700; cursor: pointer;">Sluiten</button>
        </div>
    </div>
    <script>
        class HealthTracker {
            constructor() {
                this.data = this.loadData('healthTrackerData') || { measurements: {}, medicationIntakes: {} };
                this.telegramSettings = this.loadData('telegramSettings') || { token: '', chatId: '' };
                this.currentMonth = new Date();
                this.selectedDate = null;
                this.view = 'calendar';
                this.checkTelegramAlerts();
                this.render();
            }
            loadData(key) { return JSON.parse(localStorage.getItem(key)); }
            saveData(key, value) { localStorage.setItem(key, JSON.stringify(value)); }
            async sendTelegramMessage(message) {
                if (!this.telegramSettings.token || !this.telegramSettings.chatId) return false;
                try {
                    const url = `https://api.telegram.org/bot${this.telegramSettings.token}/sendMessage`;
                    const response = await fetch(url, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ chat_id: this.telegramSettings.chatId, text: message, parse_mode: 'HTML' })
                    });
                    return response.ok;
                } catch (error) { console.error('Telegram error:', error); return false; }
            }
            checkTelegramAlerts() {
                const today = this.getTodayDate();
                const measurements = this.data.measurements[today] || {};
                const pillsRemaining = this.getPillsRemaining();
                if (pillsRemaining < 5 && pillsRemaining >= 0) {
                    this.sendTelegramMessage(`⚠️ <b>MEDICATIE WAARSCHUWING!</b>\n\nJe hebt nog <b>${pillsRemaining} pillen</b> Belsar over.\n\nBestellen bij huisarts! 💊`);
                }
            }
            async testTelegramAlert() {
                const statusDiv = document.getElementById('telegramStatus');
                statusDiv.innerHTML = '⏳ Bezig met testen...';
                const success = await this.sendTelegramMessage('✅ <b>TEST ALERT</b>\n\nJe Health Tracker Telegram integratie werkt! 🎉');
                if (success) {
                    statusDiv.innerHTML = '<div class="success-box">✅ Test alert verzonden! Check je Telegram.</div>';
                } else {
                    statusDiv.innerHTML = '<div class="alert-box">❌ Fout bij verzenden. Check Token & Chat ID!</div>';
                }
            }
            saveTelegramSettings() {
                const token = document.getElementById('telegramToken').value.trim();
                const chatId = document.getElementById('telegramChatId').value.trim();
                if (!token || !chatId) { alert('Voer Token en Chat ID in!'); return; }
                this.telegramSettings = { token, chatId };
                this.saveData('telegramSettings', this.telegramSettings);
                document.getElementById('telegramStatus').innerHTML = '<div class="success-box">✅ Instellingen opgeslagen!</div>';
                setTimeout(() => { this.closeSettings(); }, 1500);
            }
            openSettings() {
                document.getElementById('settingsModal').classList.add('active');
                document.getElementById('telegramToken').value = this.telegramSettings.token || '';
                document.getElementById('telegramChatId').value = this.telegramSettings.chatId || '';
                document.getElementById('telegramStatus').innerHTML = '';
            }
            closeSettings() { document.getElementById('settingsModal').classList.remove('active'); }
            getTodayDate() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }
            getColorStatus(sys, dia) {
                if (!sys || !dia) return 'empty';
                const s = parseInt(sys), d = parseInt(dia);
                if (isNaN(s) || isNaN(d)) return 'empty';
                if (s < 130 && d < 85) return 'green';
                if ((s >= 130 && s < 160) || (d >= 85 && d < 100)) return 'orange';
                return 'red';
            }
            getPillsRemaining() { return 49 - Object.keys(this.data.medicationIntakes || {}).length; }
            saveMeasurement(moment, sys, dia, hartslag) {
                if (!this.data.measurements) this.data.measurements = {};
                if (!this.data.measurements[this.selectedDate]) this.data.measurements[this.selectedDate] = {};
                if (sys && dia && hartslag) {
                    this.data.measurements[this.selectedDate][moment] = { sys: parseInt(sys), dia: parseInt(dia), hartslag: parseInt(hartslag) };
                } else {
                    delete this.data.measurements[this.selectedDate][moment];
                }
                this.saveData('healthTrackerData', this.data);
            }
            recordMedicationIntake(time) {
                if (!this.data.medicationIntakes) this.data.medicationIntakes = {};
                if (time) {
                    this.data.medicationIntakes[this.selectedDate] = time;
                    if (this.getPillsRemaining() < 5) {
                        this.sendTelegramMessage(`⚠️ <b>MEDICATIE WAARSCHUWING!</b>\n\nJe hebt nog <b>${this.getPillsRemaining()} pillen</b> Belsar over.\n\nBestellen bij huisarts! 💊`);
                    }
                } else {
                    delete this.data.medicationIntakes[this.selectedDate];
                }
                this.saveData('healthTrackerData', this.data);
                this.render();
            }
            updateStatusBadge(moment) {
                const sys = document.querySelector(`.sys-${moment}`)?.value || '';
                const dia = document.querySelector(`.dia-${moment}`)?.value || '';
                const status = this.getColorStatus(sys, dia);
                const badge = document.getElementById(`status-${moment}`);
                if (badge) {
                    badge.className = `status-badge ${status}`;
                    badge.innerHTML = status === 'empty' ? '❌' : `<span style="width: 8px; height: 8px; border-radius: 50%; background: ${status === 'green' ? '#10b981' : status === 'orange' ? '#f59e0b' : '#ef4444'}; margin-right: 6px;"></span>${sys}/${dia}`;
                }
                const hartslag = document.querySelector(`.hartslag-${moment}`)?.value || '';
                if (sys && dia && hartslag) this.saveMeasurement(moment, sys, dia, hartslag);
            }
            selectDate(dateStr) { this.selectedDate = dateStr; this.view = 'day'; this.render(); }
            goBackToCalendar() { this.view = 'calendar'; this.render(); }
            render() {
                if (this.view === 'calendar') {
                    document.getElementById('app').innerHTML = this.renderCalendar();
                } else {
                    document.getElementById('app').innerHTML = this.renderDayView();
                }
                this.attachListeners();
            }
            renderCalendar() {
                const year = this.currentMonth.getFullYear();
                const month = this.currentMonth.getMonth();
                const today = this.getTodayDate();
                return `<div style="padding:12px;"><div style="background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);color:white;border-radius:16px;padding:12px;margin-bottom:16px;display:flex;gap:12px;"><img src="/HealthApp/logo.png" style="width:48px;height:48px;border-radius:12px;background:white;padding:4px;"><div><h1 style="font-size:18px;font-weight:700;margin:0;">Health Tracker</h1><p style="font-size:12px;opacity:0.9;margin:0;">Dagelijkse monitoring</p></div></div><div style="background:white;border-radius:12px;padding:10px;margin-bottom:12px;box-shadow:0 1px 4px rgba(0,0,0,0.03);"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;"><h2 style="font-size:13px;font-weight:700;margin:0;">💊 ${this.getPillsRemaining()}/49</h2></div></div><div style="display:flex;justify-content:space-between;margin-bottom:12px;gap:8px;"><button class="prev-month" style="background:white;border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;">◀</button><h2 style="font-size:16px;font-weight:700;flex:1;text-align:center;">📅 ${['januari','februari','maart','april','mei','juni','juli','augustus','september','oktober','november','december'][month]} ${year}</h2><button class="next-month" style="background:white;border:none;border-radius:10px;width:36px;height:36px;cursor:pointer;">▶</button></div></div>`;
            }
            renderDayView() {
                const [year, month, day] = this.selectedDate.split('-');
                const measurements = this.data.measurements[this.selectedDate] || {};
                const medicineTime = this.data.medicationIntakes?.[this.selectedDate];
                return `<div style="padding:12px;"><div style="background:linear-gradient(135deg,#3b82f6 0%,#2563eb 100%);color:white;border-radius:16px;padding:12px;margin-bottom:12px;"><button class="back-btn" style="background:rgba(255,255,255,0.2);border:none;border-radius:8px;width:32px;height:32px;color:white;font-size:16px;cursor:pointer;margin-bottom:8px;">◀</button><h1 style="font-size:18px;font-weight:700;margin:0;">${day}-${month}-${year}</h1></div><div style="background:white;border-radius:12px;padding:12px;margin-bottom:12px;"><h2 style="font-weight:700;">💊 Belsar ${this.getPillsRemaining()}/49</h2><input type="time" class="input-field" value="${medicineTime || ''}" oninput="app.recordMedicationIntake(this.value);"></div></div>`;
            }
            attachListeners() {
                document.querySelector('.back-btn')?.addEventListener('click', () => this.goBackToCalendar());
                document.querySelector('.prev-month')?.addEventListener('click', () => { this.currentMonth.setMonth(this.currentMonth.getMonth() - 1); this.render(); });
                document.querySelector('.next-month')?.addEventListener('click', () => { this.currentMonth.setMonth(this.currentMonth.getMonth() + 1); this.render(); });
            }
        }
        const app = new HealthTracker();
        const settingsBtn = document.createElement('button');
        settingsBtn.className = 'settings-btn';
        settingsBtn.innerHTML = '⚙️';
        settingsBtn.onclick = () => app.openSettings();
        document.body.appendChild(settingsBtn);
    </script>
</body>
</html>
